<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LE Command Center — Office Floor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c1320; --ink:#1b2435;
    --bldg:#dfe3ea; --bldgEdge:#b8c0cd;
    --hall:#eceef2; --hallLine:#dcdfe6;
    --wall:#c2c8d2; --wallHi:#e6e9ef;
    --label:#1f2b3e; --labelTxt:#eef3fa;
    --deskTop:#f6f7f9; --deskEdge:#cfd4dc;
    --mon:#23303f; --monGlow:#3fb6a0;
    --chair:#3f5b86; --chairBoss:#b08a3c;
    --accentLE:#2f9aa6; --accentCmd:#caa23f; --accentEbay:#6b6fd6;
    --accentDev:#d76a98; --accentSys:#3f7fd6; --accentSec:#e08a48;
    --accentDavid:#5aa37a; --accentConf:#7d8aa0; --accentLounge:#c08552;
    --lime:#7bd938;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:#eef3fa;font-family:Inter,system-ui,sans-serif;user-select:none}
  .topbar{position:fixed;top:0;left:0;right:0;height:48px;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:linear-gradient(180deg,#16233a,#0e1828);border-bottom:2px solid var(--lime);box-shadow:0 2px 14px rgba(0,0,0,.5)}
  .topbar .t{font-weight:800;font-size:14px;letter-spacing:1px}.topbar .t b{color:var(--lime)}
  .tools{display:flex;gap:6px;align-items:center}
  .tools .role{font-size:11px;color:#9bb0c9;margin-right:4px}
  .tools button{font-weight:700;font-size:10px;border:1px solid var(--lime);background:transparent;color:var(--lime);padding:6px 9px;border-radius:7px;cursor:pointer}
  .tools button.on{background:var(--lime);color:#0e1828}
  .tools button.chatbtn{border-color:#6b6fd6;color:#aab0ff}
  .stage{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;background:radial-gradient(130% 120% at 50% 0%,#1a2740,#0a111d 70%);touch-action:none;cursor:grab}
  .stage::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:40;box-shadow:inset 0 0 170px rgba(3,8,16,.6)}
  .cam{position:absolute;top:0;left:0;transform-origin:0 0}
  .world{position:absolute;top:0;left:0;width:1240px;height:1540px}
  .building{position:absolute;inset:0;border-radius:14px;background:var(--bldg);
     border:12px solid var(--bldgEdge);
     box-shadow:0 34px 80px rgba(0,0,0,.65), inset 0 0 0 2px rgba(255,255,255,.4);
     background-image:linear-gradient(180deg,rgba(255,255,255,.5),transparent 22%)}
  .hall{position:absolute;background:var(--hall);background-image:linear-gradient(0deg,var(--hallLine) 1px,transparent 1px),linear-gradient(90deg,var(--hallLine) 1px,transparent 1px);background-size:52px 52px;box-shadow:inset 0 0 50px rgba(60,80,110,.08)}
  .room{position:absolute;overflow:hidden;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.5), inset 0 0 60px rgba(40,55,80,.07)}
  .room .label{position:absolute;top:8px;left:8px;z-index:9;font-weight:800;font-size:16px;letter-spacing:.3px;color:var(--labelTxt);background:var(--label);padding:8px 14px;border-radius:7px;white-space:nowrap;box-shadow:0 3px 7px rgba(20,30,50,.3)}
  .room .label::before{content:"";display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:6px;vertical-align:middle;background:var(--ac,#7d8aa0)}
  .room.focus{box-shadow:inset 0 0 0 3px var(--lime), inset 0 0 60px rgba(123,217,56,.14)}
  .room.locked{filter:grayscale(1) brightness(.78)}
  .room.closed{filter:brightness(.6) saturate(.5)}
  /* floor tints */
  .ft-blue{background:#e7edf5}.ft-green{background:#e7f1ea}.ft-beige{background:#f0ebe0}
  .ft-lav{background:#ecebf6}.ft-teal{background:#e4f0f1}.ft-warm{background:#f3ebe2}
  .ft-gray{background:#eceef2}.ft-dark{background:#1a2330}
  /* walls + doors */
  .wall{position:absolute;z-index:8;background:linear-gradient(180deg,var(--wallHi),var(--wall));box-shadow:0 1px 3px rgba(40,55,80,.25)}
  .wall.v{background:linear-gradient(90deg,var(--wallHi),var(--wall))}
  .door{position:absolute;z-index:9;background:var(--hall)}
  /* furniture (top-down, soft realistic shadow) */
  .sh{--s:rgba(30,45,70,.18)}
  .desk{position:absolute;border-radius:4px;background:linear-gradient(180deg,#fdfdfe,var(--deskTop));box-shadow:0 5px 9px rgba(30,45,70,.18), inset 0 0 0 1px var(--deskEdge)}
  .mon{position:absolute;border-radius:2px;background:var(--mon);box-shadow:0 2px 4px rgba(30,45,70,.25), inset 0 0 5px rgba(63,182,160,.5)}
  .kbd{position:absolute;background:#e7eaef;border-radius:2px;box-shadow:0 1px 2px rgba(30,45,70,.15)}
  .chair{position:absolute;border-radius:50% 50% 45% 45%;background:radial-gradient(circle at 50% 35%,#56729e,#33486c);box-shadow:0 4px 7px rgba(30,45,70,.25)}
  .chair.boss{background:radial-gradient(circle at 50% 35%,#c7a14d,#866425)}
  .part{position:absolute;background:#cfd6e0;border-radius:2px;box-shadow:0 3px 6px rgba(30,45,70,.18)}
  .ctable{position:absolute;border-radius:14px;background:linear-gradient(180deg,#eef2f7,#d6dde8);box-shadow:0 8px 16px rgba(30,45,70,.22), inset 0 0 0 1.5px var(--deskEdge), inset 0 2px 0 rgba(255,255,255,.55)}
  .rug{position:absolute;border-radius:16px;opacity:.3}
  .plant{position:absolute;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#74c178,#2f6d3a);box-shadow:0 5px 9px rgba(30,45,70,.22), 0 0 0 4px rgba(255,255,255,.6)}
  .sofa{position:absolute;border-radius:7px;background:linear-gradient(180deg,#aeb8c8,#7e8aa0);box-shadow:0 6px 12px rgba(30,45,70,.22), inset 5px 0 0 rgba(255,255,255,.25), inset -5px 0 0 rgba(0,0,0,.06)}
  .coffee{position:absolute;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fbfcfe,#dde2ea);box-shadow:0 4px 8px rgba(30,45,70,.2)}
  .core{position:absolute;background:linear-gradient(180deg,#aeb6c4,#7c8696);border-radius:4px;box-shadow:0 8px 18px rgba(30,45,70,.3), inset 0 0 0 2px rgba(255,255,255,.3);z-index:7}
  .core .lift{position:absolute;background:#4a5468;border-radius:2px;box-shadow:inset 0 0 8px rgba(0,0,0,.4)}
  .core .lbl{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:9px;font-weight:800;color:#2a3346;letter-spacing:1px}
  .rack{position:absolute;background:#2a3547;border-radius:3px;box-shadow:0 6px 12px rgba(30,45,70,.25)}.rack i{position:absolute;left:14%;right:14%;height:3px;border-radius:1px;background:#3fb6a0;box-shadow:0 0 5px #3fb6a0}
  /* people */
  .ppl{position:absolute;width:28px;height:34px;z-index:11;cursor:pointer}.ppl.walk{z-index:13}
  .ppl .psh{position:absolute;left:1px;bottom:-4px;width:26px;height:9px;border-radius:50%;background:rgba(30,45,70,.22);filter:blur(2px)}
  .ppl .hd{position:absolute;left:7px;top:3px;width:14px;height:14px;border-radius:50%;box-shadow:inset -2px -2px 0 rgba(0,0,0,.14)}
  .ppl .hd::before{content:"";position:absolute;left:0;top:-3px;width:14px;height:7px;border-radius:7px 7px 0 0;background:#2c2018;opacity:.85}
  .ppl .bd{position:absolute;left:3px;top:16px;width:22px;height:19px;border-radius:9px 9px 6px 6px;box-shadow:inset -3px -2px 0 rgba(0,0,0,.16),0 2px 4px rgba(30,45,70,.2)}
  .walkanim{animation:bob .5s ease-in-out infinite}@keyframes bob{50%{transform:translateY(-2px)}}
  #tip{position:fixed;z-index:60;pointer-events:none;background:#16233a;border:2px solid var(--lime);border-radius:11px;padding:8px 11px;max-width:220px;font-size:12px;line-height:1.4;opacity:0;transition:opacity .12s;box-shadow:0 8px 20px rgba(0,0,0,.6)}
  #tip.show{opacity:1}#tip .n{font-weight:800;color:var(--lime)}#tip .r{color:#bfe0ff;font-size:11px}#tip .s{margin-top:3px}
  .scrim{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:.25s}.scrim.open{opacity:1;visibility:visible}
  .drawer{position:fixed;left:0;right:0;bottom:0;z-index:51;max-height:80vh;overflow:auto;background:linear-gradient(180deg,#13233a,#0d1828);border-top:3px solid var(--lime);border-radius:20px 20px 0 0;transform:translateY(103%);transition:transform .34s cubic-bezier(.2,.8,.2,1);padding:16px 18px 26px;box-shadow:0 -10px 28px rgba(0,0,0,.6)}
  .drawer.open{transform:translateY(0)}.drawer .grab{width:46px;height:5px;background:#9bb0c9;border-radius:3px;margin:0 auto 14px;opacity:.5}
  .drawer h2{font-size:17px;font-weight:800;margin:0 0 14px}
  .hud{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}.stat{background:rgba(255,255,255,.06);border-radius:13px;padding:13px}.stat .k{font-size:12px;color:#9bb0c9}.stat .v{font-size:23px;font-weight:800;margin-top:3px}.bar{height:8px;border-radius:5px;background:rgba(255,255,255,.1);margin-top:9px;overflow:hidden}.bar i{display:block;height:100%}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:11px}.card{border-radius:13px;padding:13px;background:rgba(107,111,214,.16);border:1px solid #6b6fd6}.card .k{font-size:12px;color:#c9bdff}.card .v{font-size:20px;font-weight:800}
  .feed{list-style:none;margin:0;padding:0}.feed li{background:rgba(123,217,56,.10);border-left:3px solid var(--lime);border-radius:0 9px 9px 0;padding:9px 11px;margin-bottom:9px;font-size:13px}
  .note{font-size:12px;color:#9bb0c9;margin-top:9px}
  /* CHAT DOCK */
  .chat{position:fixed;top:48px;right:0;bottom:0;width:480px;max-width:96vw;z-index:55;background:linear-gradient(180deg,#13203a,#0c1626);border-left:2px solid #6b6fd6;box-shadow:-10px 0 30px rgba(0,0,0,.5);transform:translateX(102%);transition:transform .3s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column}
  .chat.open{transform:translateX(0)}
  .chat .chead{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
  .chat .chead b{font-size:14px}.chat .chead .x{cursor:pointer;font-size:18px;color:#9bb0c9;background:none;border:0}
  .chat .tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
  .chat .tabs button{font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.18);background:transparent;color:#bcc7da;padding:5px 9px;border-radius:14px;cursor:pointer}
  .chat .tabs button.on{background:#6b6fd6;border-color:#6b6fd6;color:#fff}
  .chat .log{flex:1;overflow:auto;padding:12px 12px 4px;display:flex;flex-direction:column;gap:9px}
  .chat .msg{max-width:84%;padding:8px 11px;border-radius:12px;font-size:13px;line-height:1.45}
  .chat .msg.me{align-self:flex-end;background:#2f7fd6;color:#fff;border-bottom-right-radius:3px}
  .chat .msg.them{align-self:flex-start;background:rgba(255,255,255,.08);border-bottom-left-radius:3px}
  .chat .msg .who{display:block;font-size:10px;opacity:.7;margin-bottom:2px;font-weight:700}
  .chat .composer{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.1)}
  .chat .composer input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:10px 13px;color:#fff;font-size:13px;outline:none}
  .chat .composer button{background:var(--lime);border:0;color:#0e1828;font-weight:800;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:16px}
  .chat .status{font-size:11px;color:#8aa;padding:0 12px 8px}
  .hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:28;font-size:11px;color:#9bb0c9;background:rgba(8,18,30,.75);padding:5px 13px;border-radius:20px;border:1px solid rgba(123,217,56,.3)}
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;z-index:200;background:radial-gradient(130% 120% at 50% 0%,#1a2740,#0a111d 70%);display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif">
  <div style="width:100%;max-width:400px;margin:20px;background:linear-gradient(180deg,#13233a,#0d1828);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.6)">
    <div style="font-weight:800;font-size:20px;letter-spacing:1px;text-align:center;color:#eef3fa">LE <span style="color:#7bd938">ELECTRICAL</span></div>
    <div id="gsub" style="text-align:center;color:#9bb0c9;font-size:13px;margin:4px 0 20px">Sign in to continue</div>
    <form id="gForm">
      <input id="gEmail" type="email" placeholder="Email" autocomplete="username" style="width:100%;margin-bottom:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:11px;padding:12px 14px;color:#fff;font-size:15px;outline:none">
      <input id="gPass" type="password" placeholder="Password" autocomplete="current-password" style="width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:11px;padding:12px 14px;color:#fff;font-size:15px;outline:none">
      <button type="submit" style="width:100%;margin-top:16px;padding:13px;border:0;border-radius:11px;background:#7bd938;color:#0e1828;font-weight:800;font-size:15px;cursor:pointer">Sign in</button>
      <div id="gErr" style="color:#ff8a8a;font-size:13px;margin-top:12px;text-align:center;min-height:16px"></div>
    </form>
    <div id="gLand" style="display:none">
      <button onclick="document.getElementById('gate').style.display='none'" style="display:flex;width:100%;gap:14px;align-items:center;text-align:left;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px;color:#eef3fa;cursor:pointer;margin-bottom:12px;font-family:inherit"><span style="font-size:28px">🏢</span><span><b style="font-size:16px">LE Command Center</b><br><span style="font-size:12px;color:#9bb0c9">Office floor · agents · chat · live ops</span></span></button>
      <button onclick="openJobs()" style="display:flex;width:100%;gap:14px;align-items:center;text-align:left;text-decoration:none;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px;color:#eef3fa;cursor:pointer;font-family:inherit"><span style="font-size:28px">📋</span><span><b style="font-size:16px">LE Electric — Jobs in Progress</b><br><span style="font-size:12px;color:#9bb0c9">Jobs · progress · next steps</span></span></button>
      <button onclick="openJobs('')" style="display:flex;width:100%;gap:14px;align-items:center;text-align:left;background:linear-gradient(135deg,rgba(124,58,237,.22),rgba(168,85,247,.10));border:1px solid rgba(168,85,247,.5);border-radius:14px;padding:16px;color:#eef3fa;cursor:pointer;margin-top:12px;font-family:inherit"><span style="font-size:28px">⚡</span><span><b style="font-size:16px">Early Access — Jobs in Progress <span style="font-size:10px;font-weight:800;background:#7c3aed;color:#fff;padding:2px 7px;border-radius:999px;margin-left:4px">BETA</span></b><br><span style="font-size:12px;color:#c4b5fd">Test new features safely · promote to main when approved</span></span></button>
      <button onclick="openProgress()" style="display:flex;width:100%;gap:14px;align-items:center;text-align:left;background:rgba(124,58,237,.12);border:1px solid rgba(168,85,247,.35);border-radius:14px;padding:16px;color:#eef3fa;cursor:pointer;margin-top:12px;font-family:inherit"><span style="font-size:28px">📝</span><span><b style="font-size:16px">LE Electric Progress</b><br><span style="font-size:12px;color:#c4b5fd">Quick prompt — request an update or change</span></span></button>
      <button id="gOut" style="display:block;margin:18px auto 0;background:none;border:0;color:#9bb0c9;font-size:12px;cursor:pointer;text-decoration:underline">Sign out</button>
    </div>
  </div>
</div>
<div class="topbar"><div class="t">LE <b>COMMAND CENTER</b></div>
  <div class="tools"><span class="role">view:</span><button id="roleOwner" class="on" onclick="setRole('owner')">OWNER</button><button id="roleTech" onclick="setRole('field_technician')">FIELD&nbsp;TECH</button>
  <button class="chatbtn" onclick="toggleChat()">💬 CHAT</button></div></div>
<div class="stage" id="stage"><div class="cam" id="cam"><div class="world" id="world"></div></div></div>
<div class="hint">drag to pan · scroll / pinch to zoom · tap a room · 💬 to message agents</div>
<div id="tip"></div>
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div class="grab"></div><div id="drawerBody"></div></div>

<!-- CHAT DOCK wired to Supabase agent_messages bus -->
<div class="chat" id="chat">
  <div class="chead"><b>💬 Agent Channel</b><button class="x" onclick="toggleChat()">✕</button></div>
  <div class="tabs" id="chatTabs"></div>
  <div class="log" id="chatLog"></div>
  <div class="status" id="chatStatus"></div>
  <div id="replyBar" style="display:none;font-size:12px;color:#c9d3e6;padding:8px 12px;border-top:1px solid rgba(255,255,255,.08);background:rgba(107,111,214,.14)"><span style="color:#aab0ff;font-weight:700">↩ Replying:</span> <span id="replyTxt"></span><button onclick="clearReply()" style="float:right;background:none;border:0;color:#9bb0c9;cursor:pointer;font-size:14px">✕</button></div>
  <div class="composer"><button id="micBtn" title="Hold to talk" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:#aab0ff;font-weight:800;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:16px">🎤</button><input id="chatInput" placeholder="Message the agent…" autocomplete="off"><button onclick="sendChat()">➤</button></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ Supabase channel config ============
   Fill SUPABASE_ANON_KEY with the project's anon/public key to make chat live.
   (Project Settings -> API -> anon public). URL is already set. */
const SUPABASE_URL = "https://scgpxbubakfwypycugoa.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_3LZjnaH6r3gOITpZqgWEYA_na5Ue7Lu";
let sb=null; try{ if(window.supabase && SUPABASE_ANON_KEY.indexOf('PASTE')<0) sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); }catch(e){}
/* ===== Auth gate: login overlay (login -> landing -> dashboard). Self-contained. ===== */
function gateLanding(){const f=document.getElementById('gForm'),l=document.getElementById('gLand'),s=document.getElementById('gsub');if(f)f.style.display='none';if(l)l.style.display='block';if(s)s.textContent='Choose a dashboard';}
if(sb){
  sb.auth.getSession().then(({data})=>{if(data.session)gateLanding();});
  document.getElementById('gForm').addEventListener('submit',async e=>{e.preventDefault();const er=document.getElementById('gErr');er.textContent='Signing in…';const {error}=await sb.auth.signInWithPassword({email:document.getElementById('gEmail').value.trim(),password:document.getElementById('gPass').value});if(error){er.textContent=error.message;return;}er.textContent='';gateLanding();});
  document.getElementById('gOut').addEventListener('click',async()=>{await sb.auth.signOut();location.reload();});
} else { const g=document.getElementById('gate'); if(g) g.style.display='none'; }

const HALL={x:556,y:14,w:128,h:1512};
/* layout inspired by the reference floor plan: labeled rooms, central elevator core, lounge + conference */
const ROOMS={
  le_ops:   {x:14, y:14,  w:330,h:300, name:'LE ELECTRICAL OPERATIONS',ft:'ft-teal', ac:'--accentLE', door:'E', table:true,
    desks:[{label:'SCHEDULING',n:'Scheduling Officer',r:'Dispatch',s:'Booking Edgemere Commons'},{label:'INVOICING',n:'Billing Clerk',r:'Invoicing',s:'Invoice #1043 — $1,850'},{label:'ESTIMATES',n:'Estimator',r:'Estimates',s:'Quoting 10-charger EV install'}]},
  commander:{x:344,y:14,  w:212,h:300, name:'COMMANDER OFFICE',ft:'ft-beige', ac:'--accentCmd', door:'E', exec:true,
    desks:[{label:'LEVI — COMMANDER',n:'Levi',r:'Commander',s:'Reviewing today’s jobs'}]},
  secretary:{x:684,y:14,  w:268,h:300, name:'SECRETARY OFFICE',ft:'ft-warm', ac:'--accentSec', door:'W', table:true,
    desks:[{label:'FRONT DESK',n:'Office Secretary',r:'Front Desk',s:'Answering customer calls'},{label:'INTAKE',n:'Intake Clerk',r:'Reception',s:'Logging a new lead'}]},
  le_cube:  {x:952,y:14,  w:274,h:300, name:'LE OPS — FIELD DESK',ft:'ft-teal', ac:'--accentLE', door:'W', pods:true,
    desks:[{label:'FOLLOW-UP',n:'Follow-up Rep',r:'Retention',s:'Calling Ms. Katzman'},{label:'PERMITS',n:'Permit Clerk',r:'Compliance',s:'Filing DOB permit'},{label:'WARRANTY',n:'Warranty',r:'Service',s:'Logging callback'},{label:'PROCUREMENT',n:'Buyer',r:'Supply',s:'Ordering breakers'}]},
  david:    {x:14, y:314, w:330,h:330, name:'MASTER DAVID',ft:'ft-lav', ac:'--accentDavid', door:'E', table:true,

  recog=new SR();recog.lang='en-US';recog.interimResults=true;recog.continuous=false;
  let base=inp.value?inp.value+' ':'';
  recog.onstart=()=>{recOn=true;b.textContent='🔴';b.style.background='#ef5350';b.style.color='#fff';setStatus('● listening…');};
  recog.onresult=e=>{let t='';for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;inp.value=base+t;};
  recog.onerror=e=>{setStatus('⚠ mic: '+e.error);};
  recog.onend=()=>{recOn=false;b.textContent='🎤';b.style.background='rgba(255,255,255,.08)';b.style.color='#aab0ff';setStatus('● connected to agent_messages');inp.focus();};
  try{recog.start();}catch(_){}}
document.getElementById('micBtn').addEventListener('click',toggleMic);

window.addEventListener('load',()=>{build();bindRooms();applyRole('owner');fetchLive();setInterval(fetchLive,60000);});
</script>
