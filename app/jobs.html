<style>

  @keyframes savebarin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .saveburst{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);background:#16a34a;color:#fff;font-weight:800;font-size:18px;padding:14px 22px;border-radius:16px;z-index:100;box-shadow:0 10px 30px rgba(22,163,74,.4);animation:burst 1.5s ease forwards;pointer-events:none}
  @keyframes burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}32%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-58%) scale(1)}}
  .taskrow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer}
  .taskrow .who{font-size:12px;color:var(--muted);font-weight:600}
  .taskrow .what{font-size:14px;font-weight:600;margin-top:2px;color:#1e3a8a}
  .sub{border:1px dashed #cbd5e1;border-radius:10px;padding:8px 10px;margin-top:8px;background:#f8fafc}
  .subhead{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .subttl{font-size:13px;font-weight:650;color:#334155}
  .substep{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
  .sub .note{border:0;padding:0;margin-top:2px}
  #dispatchBar{position:fixed;bottom:52px;left:0;right:0;max-width:860px;margin:0 auto;background:#0f172a;border-top:1px solid #1e293b;display:flex;gap:8px;padding:8px 10px;z-index:29}
  #dispatchBar input{flex:1;border:1px solid #334155;background:#1e293b;color:#fff;border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none}
  #dispatchBar button{background:#1d4ed8;color:#fff;border:0;border-radius:10px;padding:9px 15px;font-weight:600;font-size:13px;cursor:pointer}
</style>
</head>

<script>

const JOBS=[

const LS="le_jobs_beta_v1";
function loadOv(){try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}}}
function saveOv(o){try{localStorage.setItem(LS,JSON.stringify(o))}catch(e){}_syncPush();}
const SYNC_URL="/.netlify/functions/state";
let OVTS=+(localStorage.getItem(LS+"_ts")||0),_dirty=false,_pushT=null,CURID=null;
function _syncPush(){_dirty=true;clearTimeout(_pushT);_pushT=setTimeout(_pushNow,800);}
async function _pushNow(){if(!_dirty)return;try{const r=await fetch(SYNC_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({ov:OV})});const d=await r.json();if(d&&d.ts){OVTS=d.ts;try{localStorage.setItem(LS+"_ts",OVTS)}catch(e){}}_dirty=false;}catch(e){setTimeout(_pushNow,5000);}}
async function _pullNow(){try{const r=await fetch(SYNC_URL,{cache:"no-store"});const d=await r.json();if(d&&typeof d.ts==="number"&&d.ts>OVTS&&!_dirty){OV=d.ov||{};OVTS=d.ts;try{localStorage.setItem(LS,JSON.stringify(OV));localStorage.setItem(LS+"_ts",OVTS)}catch(e){}_rerender();}}catch(e){}}
function _rerender(){["renderJobs","renderEstimates","renderAppts","renderTasks"].forEach(function(fn){try{if(typeof window[fn]==="function")window[fn]()}catch(e){}});try{var dv=document.querySelector("#view-detail");if(CURID&&dv&&dv.classList.contains("active"))renderDetail(CURID)}catch(e){}}
let OV=loadOv();
let LAST_SYNC=0;
const CMD_URL="/.netlify/functions/command";
let CMDS=[];
function cmdLoad(){return fetch(CMD_URL,{cache:"no-store"}).then(function(r){return r.json()}).then(function(d){CMDS=d.commands||[]}).catch(function(){})}
function cmdEnqueue(type,jobId,payload,lane){return fetch(CMD_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({op:"enqueue",command:{type:type,jobId:jobId,payload:payload||{},lane:lane||"judgment",idempotencyKey:type+"|"+jobId+"|"+Date.now()}})}).then(function(r){return r.json()})}
function cmdRetry(cid){fetch(CMD_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({op:"update",id:cid,patch:{status:"queued"},note:"manual retry"})}).then(function(){return cmdLoad()}).then(function(){if(CURID)renderDetail(CURID)});toast("Retrying…")}
function cmdBadge(jobId){var mine=CMDS.filter(function(c){return c.jobId===jobId}).sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0)});if(!mine.length)return "";var c=mine[0];var m={queued:["⏳","Queued"],working:["🔵","Working…"],done:["✅","Done"],failed:["❌","Failed"],needs_approval:["❓","Needs your approval"]};var x=m[c.status]||["•",c.status];var s='<div class="note" style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px">'+x[0]+" "+esc((c.type||"").replace(/_/g," "))+' — <b>'+x[1]+'</b></div>';if(c.status==="failed")s+='<button class="mini undo" style="margin-top:4px" onclick="cmdRetry(&#39;'+c.id+'&#39;)">↻ Retry</button>';return s}

let PEXP={};

const PERMIT_STEPS=["File permit application (DOB/city)","Permit issued","Schedule final inspection","Inspection passed / signed off"];
const CONED_STEPS=["File application with Con Edison","Con Edison case submitted","Con Edison review / approval","Service / meter work scheduled","Final inspection scheduled","Inspection passed / sign-off"];
function paper(id){const base=(JOBS.find(x=>x.id===id)||{}).paperwork||{};const o=(OV[id]&&OV[id].paperwork)||{};function mk(k){const b=base[k]||{},ov=o[k]||{};return {enabled:ov.enabled!==undefined?ov.enabled:!!b.enabled,steps:Object.assign({},b.steps||{},ov.steps||{})};}return {permit:mk('permit'),coned:mk('coned')};}
function blankJob(id){return {id:id,customer:"",title:"",amount:"",phone:"",email:"",address:"",estimateNo:"",invoiceNo:"",paid:false,notes:"",attachments:[],invoiceHistory:[],followUp:null,calEventId:"",status:{"Lead":{s:"current"}},_new:true};}
function job(id){const base=JOBS.find(x=>x.id===id);const o=(typeof PENDING!=="undefined"&&PENDING[id])||OV[id]||{};
  const m=base?JSON.parse(JSON.stringify(base)):JSON.parse(JSON.stringify(Object.assign(blankJob(id),o)));
  ["customer","title","amount","phone","email","address","estimateNo","invoiceNo","calEventId"].forEach(function(k){if(o[k]!==undefined)m[k]=o[k];});
  if(o.status)for(const k in o.status)m.status[k]=o.status[k];
  if(o.notes!==undefined)m.notes=o.notes;
  if(o.followUp)m.followUp=o.followUp;
  if(o.paid!==undefined)m.paid=o.paid;
  if(o.attachments)m.attachments=o.attachments;
  if(base&&o.invoiceHistory)m.invoiceHistory=m.invoiceHistory.concat(o.invoiceHistory);
  return m;}
function newJobIds(){return Object.keys(OV).filter(function(k){return OV[k]&&OV[k]._new})}
function allJobIds(){return JOBS.map(function(x){return x.id}).concat(newJobIds())}
/* Task #1 — pending-changes model: edits are HELD in PENDING until Save. */
let PENDING={};
function isDirty(id){return id?!!PENDING[id]:Object.keys(PENDING).length>0}
function patch(id,fn){PENDING[id]=PENDING[id]||JSON.parse(JSON.stringify(OV[id]||{}));fn(PENDING[id]);}
function detailActive(){var dv=document.querySelector('#view-detail');return dv&&dv.classList.contains('active')}
function saveChanges(id){if(!PENDING[id]){toast('Nothing to save');return}OV[id]=PENDING[id];delete PENDING[id];saveOv(OV);playSaveAnim();try{syncNow()}catch(e){}renderDetail(id);renderJobs();toast('Saved & syncing all systems')}
function discardChanges(id){delete PENDING[id];renderDetail(id);renderJobs();toast('Changes discarded')}
function playSaveAnim(){var b=document.createElement('div');b.className='saveburst';b.textContent='✓ Saved';document.body.appendChild(b);setTimeout(function(){if(b.parentNode)b.parentNode.removeChild(b)},1500)}
var __leaveCb=null;
function leaveGuard(cb){if(detailActive()&&CURID&&PENDING[CURID]){__leaveCb=cb;openModal('<h3>Save your changes?</h3><div class="note" style="margin-top:0">You have unsaved changes on this job.</div><div class="actions" style="margin-top:12px"><button class="btn" onclick="leaveSave()">💾 Save &amp; sync</button><button class="btn sec" onclick="leaveDiscard()">Discard</button><button class="mini" onclick="closeModal();__leaveCb=null">Stay</button></div>');return false}return true}

function relDate(iso){if(!iso)return"";const d=new Date(iso+"T00:00:00");const now=new Date();now.setHours(0,0,0,0);const diff=Math.round((d-now)/86400000);
  if(diff===0)return"Today";if(diff===1)return"Tomorrow";if(diff===-1)return"Yesterday";
  if(diff>1&&diff<=14)return"in "+diff+" days";if(diff<-1&&diff>=-14)return Math.abs(diff)+" days ago";
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});}
function curStage(j){for(const s of STAGES){if(j.status[s]&&j.status[s].s==="current")return s;}

function doneStep(id,s){patch(id,o=>{o.status=o.status||{};o.status[s]={s:"done",d:new Date().toISOString().slice(0,10)};const i=STAGES.indexOf(s);if(i+1<STAGES.length){const nx=STAGES[i+1];const cur=(job(id).status[nx]||{}).s;if(cur!=="done"&&cur!=="skipped")o.status[nx]={s:"current"}}});toast("Marked '"+s+"' complete");renderDetail(id);renderJobs()}

function renderProgress(){$("#view-progress").innerHTML=`<div class="seclabel" style="color:#7c3aed">⚡ LE Electric Progress — request an update</div>
  <div class="dcard"><div class="note" style="margin-top:0">Type what you want changed or added (a new job, a status change, a new feature), copy it, and send it to Dispatch — it'll action it.</div>
   <textarea id="progMsg" style="margin-top:10px" placeholder="e.g. 'New lead: Cohen, panel upgrade at 12 Main, came by phone' or 'Mark Dani accepted' or 'Add a materials cost field'"></textarea>
   <div class="actions" style="margin-top:8px"><button class="btn" onclick="copyProg()">📋 Copy request for Dispatch</button><button class="btn sec" onclick="document.getElementById('progMsg').value='';">Clear</button></div>
   <div class="note">This BETA build stores test changes on this device only. Approved changes get promoted to the live system via "Copy update to main".</div></div>`}
function copyProg(){const t=$("#progMsg").value.trim();if(!t){toast("Type a request first");return}const msg="[LE Job Pipeline update request] "+t;if(navigator.clipboard)navigator.clipboard.writeText(msg);toast("Copied — paste it to Dispatch")}
const TITLES={jobs:"Jobs & Projects",detail:"Job Detail",estimates:"Estimates",appts:"Appointments",tasks:"Next Tasks",progress:"LE Electric Progress",dev:"Development Tasks"};
function go(tab){document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));$("#view-"+tab).classList.add("active");$("#subtitle").textContent=TITLES[tab]||"";document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));window.scrollTo(0,0)}
function _openJob(id){CURID=id;renderDetail(id);go("detail");document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.remove("on"))}
function openJob(id){var act=function(){_openJob(id)};if(leaveGuard(act))act()}
document.querySelectorAll("nav.tabs button").forEach(b=>b.addEventListener("click",()=>{var tab=b.dataset.tab;var act=function(){go(tab);if(tab==="progress")renderProgress();if(tab==="dev")devLoad()};if(leaveGuard(act))act()}));
renderJobs();renderEstimates();renderAppts();renderTasks();syncLoad();cmdLoad().then(checkApprovals);setInterval(function(){cmdLoad().then(function(){checkApprovals();var dv=document.querySelector("#view-detail");if(!(CURID&&dv&&dv.classList.contains("active")))return;var ae=document.activeElement;if(ae&&dv.contains(ae))return;renderDetail(CURID)})},8000);
function applyHash(){if(location.hash==='#progress'){go('progress');renderProgress();}}
applyHash();window.addEventListener('hashchange',applyHash);
_pullNow();setInterval(_pullNow,15000);window.addEventListener("focus",_pullNow);document.addEventListener("visibilitychange",function(){if(!document.hidden)_pullNow()});
function sendDispatch(){var el=document.getElementById('dispatchMsg');var t=el.value.trim();if(!t){toast('Type a message');return}toast('Sending…');fetch('/.netlify/functions/iterate',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({message:t,source:'real-dashboard'})}).then(function(r){return r.json()}).then(function(d){if(d&&d.ok){el.value='';toast('✅ Sent to Dispatch')}else{toast('Send failed')}}).catch(function(){toast('Send failed')})}
var _dm=document.getElementById('dispatchMsg');if(_dm)_dm.addEventListener('keydown',function(e){if(e.key==='Enter')sendDispatch()});

const DEV_URL="/.netlify/functions/devtasks";
let DEVDOC={tasks:[],seq:0,ts:0};
let DEV_IMGS=[];
let DEV_EDIT={};
let DEV_FORM={title:'',desc:'',pri:'Normal'};
let DEV_CAT='build';
function devSwitchCat(c){DEV_CAT=c;renderDev()}
function devTasksView(){return devTasks().filter(function(t){var c=t.category||'build';return DEV_CAT==='general'?c==='general':c!=='general'})}
function devGroup(t){if((t.priority||'')==='High')return 0;if(t.status==='understood'||t.status==='verify'||t.status==='question')return 1;if(t.status==='approved')return 2;return 3;}
function devTasks(){return DEVDOC.tasks||[]}
async function devLoad(){try{const r=await fetch(DEV_URL,{cache:"no-store"});DEVDOC=await r.json();}catch(e){}renderDev();}
async function devPost(body){try{const r=await fetch(DEV_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});DEVDOC=await r.json();}catch(e){}renderDev();}
function devAdd(){var title=document.getElementById('devTitle').value.trim();var desc=document.getElementById('devDesc').value.trim();var prEl=document.getElementById('devPri');var pr=prEl?prEl.value:'Normal';if(!title&&!desc){toast('Add a title or description');return}devPost({op:'add',task:{title:title,desc:desc,priority:(DEV_CAT==='general'?'Normal':pr),category:DEV_CAT,images:DEV_IMGS.slice()}});document.getElementById('devTitle').value='';document.getElementById('devDesc').value='';DEV_IMGS=[];DEV_FORM={title:'',desc:'',pri:'Normal'};toast('Task added — I will review and post my understanding')}
function devApprove(id){var t=devTasks().find(function(x){return x.id===id});var tg=(t&&t.target)||{};if(!tg.beta&&!tg.dashboard){toast('Tick Beta or Dashboard first');return}devPost({op:'patch',id:id,patch:{status:'approved'}});toast('Go-ahead sent')}
function devVerify(id){devPost({op:'patch',id:id,patch:{status:'done'}});toast('Marked done')}
function devTarget(id,which){var patch=which==='dashboard'?{target:{beta:true,dashboard:true}}:{target:{beta:true,dashboard:false}};devPost({op:'patch',id:id,patch:patch})}
function devRemove(id){if(confirm('Remove this task?'))devPost({op:'remove',id:id})}
function devReview(id){var t=devTasks().find(function(x){return x.id===id});DEV_EDIT[id]=(t&&t.desc)||'';renderDev();var ta=document.getElementById('ed_'+id);if(ta){ta.style.height='auto';ta.style.height=Math.max(240,ta.scrollHeight+4)+'px';ta.focus();}}
function devReviewCancel(id){delete DEV_EDIT[id];renderDev()}
function devReviewSave(id){var txt=DEV_EDIT[id]||'';delete DEV_EDIT[id];devPost({op:'patch',id:id,patch:{desc:txt,status:'new',understanding:'',question:''}});toast('Sent back for re-review')}
function devMicEdit(id){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('STT not supported here');return}var r=new SR();r.lang='en-US';r.interimResults=false;toast('🎤 Listening…');r.onresult=function(e){DEV_EDIT[id]=((DEV_EDIT[id]||'')+' '+e.results[0][0].transcript).trim();renderDev()};r.onerror=function(){toast('Mic error')};r.start()}
function devFile(input){var f=input.files&&input.files[0];if(f)devReadImg(f);input.value=''}
function devReadImg(file){var rd=new FileReader();rd.onload=function(e){devCompress(e.target.result)};rd.readAsDataURL(file)}
function devCompress(dataUrl){var img=new Image();img.onload=function(){var mx=1000,w=img.width,h=img.height;if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx}else{w=Math.round(w*mx/h);h=mx}}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);DEV_IMGS.push(c.toDataURL('image/jpeg',0.7));renderDevForm();toast('Photo attached')};img.src=dataUrl}
function devBadge(s){var m={new:['🟡','New'],understood:['🔵','I am on it'],question:['❓','Needs your answer'],approved:['🟢','Approved — running'],verify:['🧪','Verify it works'],done:['✅','Done']};var x=m[s]||m.new;return '<span class="pill">'+x[0]+' '+x[1]+'</span>'}
function devTargetRow(t){var tg=t.target||{};return '<div style="display:flex;gap:14px;align-items:center;margin-top:8px;font-size:13px;font-weight:600"><label style="display:flex;gap:5px;align-items:center;cursor:pointer"><input type="checkbox" '+(tg.dashboard?'checked':'')+' onclick="devTarget(&#39;'+t.id+'&#39;,&#39;dashboard&#39;)" style="width:auto;margin:0"> Dashboard <span class="note" style="border:0;padding:0;font-weight:400">(both)</span></label><label style="display:flex;gap:5px;align-items:center;cursor:pointer"><input type="checkbox" '+(tg.beta&&!tg.dashboard?'checked':'')+' onclick="devTarget(&#39;'+t.id+'&#39;,&#39;beta&#39;)" style="width:auto;margin:0"> Beta only</label></div>'}
function devCard(t){var imgs=(t.images||[]).map(function(u){return '<img src="'+u+'" style="max-width:80px;max-height:80px;border-radius:8px;margin:4px 4px 0 0">'}).join('');var b='<div class="taskrow" style="cursor:default"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><b>#'+t.num+' · '+esc(t.title||'(untitled)')+'</b>'+devBadge(t.status)+'</div>'+(t.desc?'<div class="note" style="margin-top:4px;white-space:pre-wrap">'+esc(t.desc)+'</div>':'')+(imgs?'<div style="margin-top:6px">'+imgs+'</div>':'');if(DEV_EDIT[t.id]!==undefined){b+='<div class="nextbox" style="margin-top:8px"><div class="lbl">Edit / add detail, then re-review</div><textarea id="ed_'+t.id+'" oninput="DEV_EDIT[&#39;'+t.id+'&#39;]=this.value;this.style.height=&#39;auto&#39;;this.style.height=this.scrollHeight+&#39;px&#39;" style="margin-top:6px;min-height:240px">'+esc(DEV_EDIT[t.id])+'</textarea><button class="mini" onclick="devMicEdit(&#39;'+t.id+'&#39;)">🎤 dictate</button><div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="devReviewSave(&#39;'+t.id+'&#39;)">🔁 Send for re-review</button><button class="btn sec" onclick="devReviewCancel(&#39;'+t.id+'&#39;)">Cancel</button></div></div>'}else{if(t.status==='understood'&&t.understanding){b+='<div class="nextbox" style="margin-top:8px"><div class="lbl">My understanding</div><div class="txt" style="white-space:pre-wrap">'+esc(t.understanding)+'</div>'+devTargetRow(t)+'<div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="devApprove(&#39;'+t.id+'&#39;)">✅ Go ahead</button><button class="btn sec" onclick="devReview(&#39;'+t.id+'&#39;)">🔁 Review it again</button></div></div>'}if(t.status==='question'){b+='<div class="followbox" style="margin-top:8px"><div class="lbl">Needs your answer</div><div style="white-space:pre-wrap;margin-top:3px">'+esc(t.question||'')+'</div><div class="note" style="border:0;padding:0;margin-top:6px">Reply here in chat referencing task #'+t.num+', or edit the task below.</div><button class="btn sec" style="margin-top:6px" onclick="devReview(&#39;'+t.id+'&#39;)">🔁 Review it again</button></div>'}if(t.status==='approved'){var tg=t.target||{};b+='<div class="note" style="margin-top:6px;color:#166534">▶ Approved for '+(tg.dashboard?'Dashboard + Beta':'Beta')+' — I am on it.</div>'}if(t.status==='verify'){b+='<div class="nextbox" style="margin-top:8px"><div class="lbl">Verify it works</div><div class="txt" style="font-weight:500">Built &amp; deployed — please confirm it is working.</div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="devVerify(&#39;'+t.id+'&#39;)">✅ Works — mark done</button><button class="btn sec" onclick="devReview(&#39;'+t.id+'&#39;)">🔁 Not quite</button></div></div>'}}b+='<div style="margin-top:6px"><button class="mini" onclick="devRemove(&#39;'+t.id+'&#39;)">✕ Remove</button></div></div>';return b}
function renderDevForm(){var el=document.getElementById('devPrev');if(el)el.innerHTML=DEV_IMGS.map(function(u){return '<img src="'+u+'" style="max-width:60px;max-height:60px;border-radius:8px;margin:4px 4px 0 0">'}).join('')}
function renderDev(){var active=devTasksView().filter(function(t){return t.status!=='done'});var done=devTasksView().filter(function(t){return t.status==='done'});active.sort(function(a,b){var g=devGroup(a)-devGroup(b);return g!==0?g:(a.num-b.num)});var h='<div style="display:flex;gap:6px;margin:0 2px 8px"><button class="mini'+(DEV_CAT==='build'?' jump':'')+'" onclick="devSwitchCat(&#39;build&#39;)">🛠️ Build</button><button class="mini'+(DEV_CAT==='general'?' jump':'')+'" onclick="devSwitchCat(&#39;general&#39;)">📋 General</button></div>';h+='<div class="dcard"><input id="devTitle" type="text" placeholder="Title (optional — I can name it)" value="'+esc(DEV_FORM.title)+'" oninput="DEV_FORM.title=this.value"><div style="position:relative"><textarea id="devDesc" placeholder="Describe the change — as much detail as you want" style="min-height:44px" oninput="DEV_FORM.desc=this.value;this.style.height=&#39;auto&#39;;this.style.height=this.scrollHeight+&#39;px&#39;">'+esc(DEV_FORM.desc)+'</textarea><button class="mini" onclick="devMic()" style="position:absolute;right:8px;bottom:14px">🎤</button></div><div id="devPrev"></div><div style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap"><label class="mini" style="cursor:pointer">📎 Attach<input type="file" accept="image/*" style="display:none" onchange="devFile(this)"></label>'+(DEV_CAT==='build'?'<select id="devPri" onchange="DEV_FORM.pri=this.value" style="border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-family:inherit"><option>Normal</option><option>High</option><option>Low</option></select>':'')+'<span class="note" style="border:0;padding:0">or paste a photo</span></div><button class="btn full" onclick="devAdd()" style="margin-top:8px">＋ Add task</button></div>';h+=active.length?(function(){var out='';var labels=['⭐ High priority','⏳ Awaiting your go-ahead','🔵 In progress','🟡 Not yet reviewed'];var lastG=-1;active.forEach(function(t){var g=devGroup(t);if(g!==lastG){out+='<div class="seclabel" style="margin:14px 2px 8px">'+labels[g]+'</div>';lastG=g;}out+=devCard(t);});return out;})():'<div class="note">No '+(DEV_CAT==='general'?'general':'active')+' tasks. Add one above.</div>';if(done.length){h+='<div class="dcard" style="margin-top:10px"><div style="cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="var d=document.getElementById(&#39;devDone&#39;);d.style.display=(d.style.display===&#39;none&#39;?&#39;block&#39;:&#39;none&#39;)"><b>✓ Completed ('+done.length+')</b><span class="note" style="border:0;padding:0">tap to expand</span></div><div id="devDone" style="display:none;margin-top:8px">'+done.map(function(t){return '<div class="note" style="border-bottom:1px solid var(--line);padding:6px 0"><b>#'+t.num+'</b> '+esc(t.title||t.desc||'')+(t.report?' — '+esc(t.report):'')+'</div>'}).join('')+'</div></div>'}var v=document.getElementById('view-dev');if(v)v.innerHTML=h;renderDevForm();var dd=document.getElementById('devDesc');if(dd&&dd.value){dd.style.height='auto';dd.style.height=dd.scrollHeight+'px'}}
function devMic(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Speech-to-text not supported here');return}var r=new SR();r.lang='en-US';r.interimResults=false;toast('🎤 Listening…');r.onresult=function(e){var t=e.results[0][0].transcript;var d=document.getElementById('devDesc');if(d){d.value=(d.value?d.value+' ':'')+t;DEV_FORM.desc=d.value;d.style.height='auto';d.style.height=d.scrollHeight+'px'}};r.onerror=function(){toast('Mic error')};r.start()}
document.addEventListener('paste',function(e){var dv=document.getElementById('view-dev');if(!dv||!dv.classList.contains('active'))return;var items=(e.clipboardData||{}).items||[];for(var i=0;i<items.length;i++){if(items[i].type&&items[i].type.indexOf('image')===0){var f=items[i].getAsFile();if(f)devReadImg(f)}}});
setInterval(function(){var v=document.getElementById('view-dev');if(!v||!v.classList.contains('active'))return;if(Object.keys(DEV_EDIT).length)return;var ae=document.activeElement;if(ae&&v.contains(ae))return;if(DEV_FORM.title||DEV_FORM.desc)return;devLoad()},15000);


(function(){var ls=0;var hd=document.querySelector('header.app');window.addEventListener('scroll',function(){if(!hd)return;var y=window.scrollY||document.documentElement.scrollTop;if(y>ls&&y>48){hd.classList.add('hide')}else{hd.classList.remove('hide')}ls=y<=0?0:y},{passive:true})})();

function syncLoad(){fetch('/.netlify/functions/jobsdata',{cache:'no-store'}).then(function(r){return r.json()}).then(function(d){if(d&&Array.isArray(d.jobs)&&d.jobs.length){JOBS.length=0;d.jobs.forEach(function(j){JOBS.push(j)})}if(d&&d.syncedAt)LAST_SYNC=d.syncedAt;try{renderJobs();renderEstimates();renderAppts();renderTasks()}catch(e){}}).catch(function(){})}
function syncNow(){toast('Requesting sync…');fetch('/.netlify/functions/jobsdata',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({op:'request'})}).then(function(){return fetch('/.netlify/functions/jobsdata',{cache:'no-store'})}).then(function(r){return r.json()}).then(function(d){if(d&&Array.isArray(d.jobs)&&d.jobs.length){JOBS.length=0;d.jobs.forEach(function(j){JOBS.push(j)})}if(d&&d.syncedAt)LAST_SYNC=d.syncedAt;try{renderJobs()}catch(e){}toast(LAST_SYNC?('Synced '+new Date(LAST_SYNC).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})):'Sync requested — data will refresh shortly')}).catch(function(){toast('Sync failed')})}

(function(){var ptr=document.getElementById('ptr');if(!ptr)return;var ico=ptr.querySelector('b');var main=document.querySelector('main');var startY=0,pulling=false,dist=0,TH=70;function reset(){ptr.classList.remove('spin');ptr.style.transition='transform .2s';ptr.style.transform='translate(-50%,-44px)';ico.style.transform='';if(main){main.style.transition='transform .2s';main.style.transform=''}dist=0;}function refresh(){ptr.classList.add('spin');ptr.style.transition='transform .2s';ptr.style.transform='translate(-50%,16px)';if(main){main.style.transition='transform .2s';main.style.transform='translateY(46px)'}try{if(typeof _pullNow==='function')_pullNow()}catch(e){}try{if(typeof syncLoad==='function')syncLoad()}catch(e){}try{var dv=document.getElementById('view-dev');if(dv&&dv.classList.contains('active')&&typeof devLoad==='function')devLoad()}catch(e){}try{toast('Refreshing…')}catch(e){}setTimeout(reset,900);}window.addEventListener('touchstart',function(e){if((window.scrollY||document.documentElement.scrollTop)<=0){startY=e.touches[0].clientY;pulling=true;ptr.style.transition='none';if(main)main.style.transition='none'}else pulling=false},{passive:true});window.addEventListener('touchmove',function(e){if(!pulling)return;var dy=e.touches[0].clientY-startY;if(dy<=0){dist=0;return}if((window.scrollY||document.documentElement.scrollTop)<=0){e.preventDefault();dist=Math.min(dy*0.5,110);ptr.style.transform='translate(-50%,'+(Math.min(dist,60)-44)+'px)';ico.style.transform='rotate('+(dist*4)+'deg)';if(main)main.style.transform='translateY('+dist+'px)'}},{passive:false});window.addEventListener('touchend',function(){if(!pulling)return;pulling=false;if(dist>TH)refresh();else reset()},{passive:true});})();
</script>
