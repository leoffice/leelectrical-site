<style>
  :root{
    --bg:#f1f5f9;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
    --brand:#1d4ed8;--brand-ink:#1e3a8a;--done:#16a34a;--current:#d97706;--upcoming:#cbd5e1;
    --beta:#7c3aed;--pill:#eff6ff;--pill-ink:#1d4ed8;--danger:#dc2626;--ok:#16a34a;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;max-width:860px;margin:0 auto;padding-bottom:150px}
  header.app{position:sticky;top:0;z-index:20;background:var(--ink);color:#fff;padding:9px 16px 8px;box-shadow:var(--shadow);transition:transform .25s ease}
  header.app.hide{transform:translateY(-105%)}
  header.app h1{font-size:15px;margin:0;font-weight:650}
  header.app .sub{font-size:11px;color:#94a3b8;margin-top:1px}
  .beta-banner{background:linear-gradient(90deg,#7c3aed,#a855f7);color:#fff;font-size:12px;font-weight:700;text-align:center;padding:6px 12px;letter-spacing:.4px}
  main{padding:14px}
  .view{display:none}.view.active{display:block}
  .seclabel{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:6px 2px 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:12px}
  .card .body{flex:1;min-width:0}
  .card .title{font-weight:640;font-size:15.5px}
  .card .meta{font-size:12.5px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .next{font-size:12.5px;color:var(--brand-ink);margin-top:6px;font-weight:520}
  .card .chev{color:#cbd5e1;font-size:20px}
  .pill{display:inline-block;font-size:11px;font-weight:650;padding:3px 9px;border-radius:999px;background:var(--pill);color:var(--pill-ink);margin-top:7px}

  .back{background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);margin-bottom:12px}

  .contact .row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .cbtn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:13px;font-weight:600;padding:8px 12px;border-radius:10px;border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8}
  .cbtn.muted{border-color:var(--line);background:#f8fafc;color:var(--muted)}
  .addr{font-size:13px;color:var(--muted);margin-top:8px}
  .followbox{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .followbox .lbl{font-size:11px;font-weight:700;color:#c2410c;text-transform:uppercase;letter-spacing:.5px}
  .nextbox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .nextbox .lbl{font-size:11px;font-weight:700;color:#1d4ed8;text-transform:uppercase;letter-spacing:.5px}
  .nextbox .txt{font-size:15px;font-weight:600;margin-top:3px;color:#1e3a8a}
  .nextbox .when{font-size:12.5px;color:#2563eb;margin-top:2px;font-weight:600}
  .tl{list-style:none;margin:0;padding:0}
  .tl li{display:flex;gap:12px}
  .tl .dot{position:relative;flex:none;width:24px;display:flex;justify-content:center}
  .tl .dot i{width:16px;height:16px;border-radius:50%;background:var(--upcoming);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-style:normal;font-weight:700;z-index:2;margin-top:3px}

  .tl .dot::after{content:"";position:absolute;top:18px;bottom:-4px;width:2px;background:var(--line);z-index:1}
  .tl li:last-child .dot::after{display:none}
  .tl .lbl{flex:1;padding-bottom:14px}
  .tl .lbl .s{font-size:14px;font-weight:600}
  .tl .lbl .d{font-size:12px;color:var(--muted);margin-top:1px}
  .tl .skipped .s{color:#94a3b8;font-weight:500}

  .mini{font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink)}
  .mini.go{border-color:#bbf7d0;background:#f0fdf4;color:#166534}
  .mini.undo{border-color:#fecaca;background:#fef2f2;color:#991b1b}
  .mini.jump{border-color:#bfdbfe;background:#eff6ff;color:#1d4ed8}
  .actions{display:flex;flex-wrap:wrap;gap:8px}
  .btn{display:inline-block;text-decoration:none;background:var(--brand);color:#fff;font-size:13.5px;font-weight:650;padding:11px 14px;border-radius:11px;border:0;cursor:pointer}
  .btn.sec{background:#fff;color:var(--brand);border:1px solid #bfdbfe}
  .btn.warn{background:#f59e0b}
  .btn.full{width:100%;margin-top:8px}
  textarea,input[type=text],input[type=date]{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);outline:none;margin-bottom:6px}
  textarea{resize:vertical;min-height:70px}
  .note{font-size:13px;color:var(--muted);margin-top:8px}
  .att{display:flex;align-items:center;gap:8px;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;background:#f8fafc}
  .att a{color:var(--brand);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis}
  .modal{position:fixed;inset:0;z-index:400;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:18px}
  .modal.open{display:flex}
  .modal .box{background:#fff;border-radius:16px;max-width:440px;width:100%;padding:18px;max-height:80vh;overflow:auto}
  .modal h3{margin:0 0 10px;font-size:16px}
  .modal .close{float:right;background:none;border:0;font-size:20px;cursor:pointer;color:var(--muted)}
  .hist{font-size:13px;padding:8px 0;border-bottom:1px solid var(--line)}
  #toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:13px;font-weight:600;padding:10px 16px;border-radius:12px;opacity:0;transition:opacity .25s;z-index:500;max-width:90%;text-align:center}
  #toast.show{opacity:1}
  body{overscroll-behavior-y:contain}
  #ptr{position:fixed;top:0;left:50%;z-index:25;transform:translate(-50%,-44px);pointer-events:none}
  #ptr b{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:#fff;border:1px solid var(--line);border-radius:50%;box-shadow:var(--shadow);color:var(--brand);font-size:19px;font-weight:400}
  #ptr.spin b{animation:ptrspin .7s linear infinite}
  @keyframes ptrspin{to{transform:rotate(360deg)}}
  nav.tabs{position:fixed;bottom:0;left:0;right:0;max-width:860px;margin:0 auto;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom,0)}
  nav.tabs button{flex:1;background:none;border:none;padding:8px 3px 7px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav.tabs button .ic{font-size:18px;line-height:1}
  nav.tabs button.on{color:var(--brand)}
  nav.tabs button.progress{color:#7c3aed}
  .savebar{position:sticky;top:0;z-index:25;display:flex;justify-content:space-between;align-items:center;gap:8px;background:#fff7ed;border:1px solid #fdba74;color:#9a3412;font-weight:700;font-size:13px;border-radius:12px;padding:8px 12px;margin:0 0 10px;box-shadow:var(--shadow);animation:savebarin .25s ease}
  @keyframes savebarin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .saveburst{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);background:#16a34a;color:#fff;font-weight:800;font-size:18px;padding:14px 22px;border-radius:16px;z-index:100;box-shadow:0 10px 30px rgba(22,163,74,.4);animation:burst 1.5s ease forwards;pointer-events:none}
  @keyframes burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}32%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-58%) scale(1)}}
  .taskrow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer}
  .taskrow .who{font-size:12px;color:var(--muted);font-weight:600}
  .taskrow .what{font-size:14px;font-weight:600;margin-top:2px;color:#1e3a8a}
  .sub{border:1px dashed #cbd5e1;border-radius:10px;padding:8px 10px;margin-top:8px;background:#f8fafc}
  .subhead{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .subttl{font-size:13px;font-weight:650;color:#334155}
  .substep{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
  .sub .note{border:0;padding:0;margin-top:2px}
  #chatFab{position:fixed;bottom:66px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--brand,#1d4ed8);color:#fff;font-size:23px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.28);z-index:40;cursor:pointer}
  #chatFab .cdot{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;background:#ef4444;border-radius:9px;color:#fff;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 3px}
  #chatPanel{position:fixed;bottom:66px;right:12px;width:min(370px,94vw);background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 14px 44px rgba(0,0,0,.3);z-index:41;display:none;flex-direction:column;overflow:hidden}
  #chatPanel.open{display:flex}
  .chatHead{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;background:var(--brand,#1d4ed8);color:#fff;font-weight:700;font-size:13px}
  .chatHead button{background:none;border:none;color:#fff;font-size:16px;cursor:pointer}
  .chatBody{max-height:42vh;overflow:auto;padding:10px 12px;font-size:13px;background:#f8fafc}
  .chatInput{display:flex;gap:6px;align-items:flex-end;padding:8px;border-top:1px solid var(--line);background:#fff}
  .chatInput textarea{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px;font-family:inherit;font-size:13px;resize:none;min-height:38px;max-height:120px;outline:none}
  .chatInput .send{background:var(--brand,#1d4ed8);color:#fff;border:0;border-radius:10px;padding:9px 13px;font-weight:600;font-size:13px;cursor:pointer}
  #chatMic{width:40px;height:38px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:16px;transition:transform .08s ease}
  #chatMic.live{background:#fee2e2;border-color:#fca5a5}
</style>
</head>

<header class="app"><h1>LE Electric Dashboard</h1><div class="sub" id="subtitle">Jobs &amp; Projects</div></header>

<script>

const JOBS=[

];
const LS="le_jobs_beta_v1";
function loadOv(){try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}}}
function saveOv(o){try{localStorage.setItem(LS,JSON.stringify(o))}catch(e){}_syncPush();}
const SYNC_URL="/.netlify/functions/state";
let OVTS=+(localStorage.getItem(LS+"_ts")||0),_dirty=false,_pushT=null,CURID=null;
function _syncPush(){_dirty=true;clearTimeout(_pushT);_pushT=setTimeout(_pushNow,800);}
async function _pushNow(){if(!_dirty)return;try{const r=await fetch(SYNC_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({ov:OV})});const d=await r.json();if(d&&d.ts){OVTS=d.ts;try{localStorage.setItem(LS+"_ts",OVTS)}catch(e){}}_dirty=false;}catch(e){setTimeout(_pushNow,5000);}}
async function _pullNow(){try{const r=await fetch(SYNC_URL,{cache:"no-store"});const d=await r.json();if(d&&typeof d.ts==="number"&&d.ts>OVTS&&!_dirty){OV=d.ov||{};OVTS=d.ts;try{localStorage.setItem(LS,JSON.stringify(OV));localStorage.setItem(LS+"_ts",OVTS)}catch(e){}_rerender();}}catch(e){}}
function _rerender(){["renderJobs","renderEstimates","renderAppts","renderTasks"].forEach(function(fn){try{if(typeof window[fn]==="function")window[fn]()}catch(e){}});try{var dv=document.querySelector("#view-detail");if(CURID&&dv&&dv.classList.contains("active"))renderDetail(CURID)}catch(e){}}
let OV=loadOv();
let LAST_SYNC=0;
const CMD_URL="/.netlify/functions/command";
let CMDS=[];
function cmdLoad(){return fetch(CMD_URL,{cache:"no-store"}).then(function(r){return r.json()}).then(function(d){CMDS=d.commands||[]}).catch(function(){})}
function cmdEnqueue(type,jobId,payload,lane){return fetch(CMD_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({op:"enqueue",command:{type:type,jobId:jobId,payload:payload||{},lane:lane||"judgment",idempotencyKey:type+"|"+jobId+"|"+Date.now()}})}).then(function(r){return r.json()})}
function cmdRetry(cid){fetch(CMD_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({op:"update",id:cid,patch:{status:"queued"},note:"manual retry"})}).then(function(){return cmdLoad()}).then(function(){if(CURID)renderDetail(CURID)});toast("Retrying…")}
function cmdBadge(jobId){var mine=CMDS.filter(function(c){return c.jobId===jobId}).sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0)});if(!mine.length)return "";var c=mine[0];var m={queued:["⏳","Queued"],working:["🔵","Working…"],done:["✅","Done"],failed:["❌","Failed"],needs_approval:["❓","Needs your approval"]};var x=m[c.status]||["•",c.status];var s='<div class="note" style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px">'+x[0]+" "+esc((c.type||"").replace(/_/g," "))+' — <b>'+x[1]+'</b></div>';if(c.status==="failed")s+='<button class="mini undo" style="margin-top:4px" onclick="cmdRetry(&#39;'+c.id+'&#39;)">↻ Retry</button>';return s}

let PEXP={};
function togglePaperOpen(id,key){PEXP[id+key]=!PEXP[id+key];renderDetail(id)}
const DOB_STEPS=["Permit issued","Inspection requested","Inspection scheduled","Self certification","PAA complete"];
const CONED_STEPS=["Application submitted","POE scheduled","Uploaded paperwork complete","New accounts activated","Interim checklist","Final checklist","Meter installation date"];

function paper(id){const base=(JOBS.find(x=>x.id===id)||{}).paperwork||{};const o=(OV[id]&&OV[id].paperwork)||{};function mk(k){const b=base[k]||{},ov=o[k]||{};return {enabled:ov.enabled!==undefined?ov.enabled:!!b.enabled,steps:Object.assign({},b.steps||{},ov.steps||{}),dates:Object.assign({},b.dates||{},ov.dates||{})};}return {coned:mk('coned'),dob:mk('dob')};}
function blankJob(id){return {id:id,customer:"",title:"",amount:"",phone:"",email:"",address:"",estimateNo:"",invoiceNo:"",paid:false,notes:"",attachments:[],invoiceHistory:[],followUp:null,calEventId:"",status:{"Lead":{s:"current"}},_new:true};}
function job(id){const base=JOBS.find(x=>x.id===id);const o=(typeof PENDING!=="undefined"&&PENDING[id])||OV[id]||{};
  const m=base?JSON.parse(JSON.stringify(base)):JSON.parse(JSON.stringify(Object.assign(blankJob(id),o)));
  ["customer","title","amount","phone","email","address","estimateNo","invoiceNo","calEventId"].forEach(function(k){if(o[k]!==undefined)m[k]=o[k];});
  if(o.status)for(const k in o.status)m.status[k]=o.status[k];

function jumpTo(id,s){patch(id,o=>{o.status=o.status||{};const ti=STAGES.indexOf(s);STAGES.forEach((st,i)=>{const cur=(job(id).status[st]||{s:"upcoming"}).s;if(i<ti){if(cur!=="done"&&cur!=="skipped")o.status[st]={s:"done",d:(job(id).status[st]&&job(id).status[st].d)||new Date().toISOString().slice(0,10)}}else if(i===ti){o.status[st]={s:"current"}}})});toast("Jumped to '"+s+"'");renderDetail(id);renderJobs()}

function paperStep(id,key,step){var cur=paper(id)[key].steps[step]==='done';
 if(!cur&&DATE_STEPS[step]){var isDT=DATE_STEPS[step]==='datetime';var dv=prompt(step+((isDT)?' — enter date & time (e.g. 2026-07-15 10:00):':' — enter date (e.g. 2026-07-15):'),'');if(dv===null)return;dv=dv.trim();
  patch(id,o=>{o.paperwork=o.paperwork||{};o.paperwork[key]=o.paperwork[key]||{enabled:true,steps:{},dates:{}};o.paperwork[key].dates=o.paperwork[key].dates||{};if(dv)o.paperwork[key].dates[step]=dv;o.paperwork[key].steps=o.paperwork[key].steps||{};o.paperwork[key].steps[step]='done'});
  if(step==='Inspection scheduled'&&dv){var j=job(id);if(confirm('Add this inspection to the calendar appointment?')){var d0=dv.slice(0,10);cmdEnqueue('calendar_upsert',id,{calEventId:j.calEventId,summary:'Inspection — '+j.customer,start:d0,location:j.address,description:'City permit inspection: '+dv},'judgment').then(function(){return cmdLoad()});toast('Inspection staged for calendar');}}
  renderDetail(id);return;}
 patch(id,o=>{o.paperwork=o.paperwork||{};o.paperwork[key]=o.paperwork[key]||{enabled:true,steps:{}};o.paperwork[key].steps=o.paperwork[key].steps||{};o.paperwork[key].steps[step]=cur?'todo':'done'});renderDetail(id)}
function subTrack(id,key,label,steps){var p=paper(id)[key];var done=steps.filter(function(s){return p.steps[s]==='done'}).length;var open=!!PEXP[id+key];
 if(!p.enabled)return '<div class="sub"><div class="subhead"><span class="subttl">'+label+'</span><button class="mini jump" onclick="togglePaper(\''+id+'\',\''+key+'\',true)">＋ Add</button></div><div class="note">Add when this job needs it.</div></div>';
 var head='<div class="subhead" style="cursor:pointer" onclick="togglePaperOpen(\''+id+'\',\''+key+'\')"><span class="subttl">'+(open?'▾':'▸')+' '+label+'</span><span class="pill '+(done===steps.length?'paid':'')+'">'+done+'/'+steps.length+'</span></div>';
 if(!open)return '<div class="sub">'+head+'</div>';
 var rows=steps.map(function(s){var d=p.steps[s]==='done';var dt=(p.dates&&p.dates[s])?' · <b>'+esc(p.dates[s])+'</b>':(DATE_STEPS[s]?' <span class="tap">(date)</span>':'');return '<div class="substep"><button class="mini '+(d?'undo':'go')+'" onclick="paperStep(\''+id+'\',\''+key+'\',\''+s+'\')">'+(d?'↩':'✓')+'</button><span'+(d?' style="color:#166534;font-weight:600"':'')+'>'+s+dt+'</span></div>'}).join("");
 return '<div class="sub">'+head+'<div style="margin-top:4px">'+rows+'</div><button class="mini" style="margin-top:6px" onclick="togglePaper(\''+id+'\',\''+key+'\',false)">Remove</button></div>';}

function devReview(id){var t=devTasks().find(function(x){return x.id===id});DEV_EDIT[id]=(t&&t.desc)||'';renderDev();var ta=document.getElementById('ed_'+id);if(ta){ta.style.height='auto';ta.style.height=Math.max(240,ta.scrollHeight+4)+'px';ta.focus();}}

function devMicEdit(id){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('STT not supported here');return}var r=new SR();r.lang='en-US';r.interimResults=false;toast('🎤 Listening…');r.onresult=function(e){DEV_EDIT[id]=((DEV_EDIT[id]||'')+' '+e.results[0][0].transcript).trim();renderDev()};r.onerror=function(){toast('Mic error')};r.start()}
function devFile(input){var f=input.files&&input.files[0];if(f)devReadImg(f);input.value=''}
function devReadImg(file){var rd=new FileReader();rd.onload=function(e){devCompress(e.target.result)};rd.readAsDataURL(file)}
function devCompress(dataUrl){var img=new Image();img.onload=function(){var mx=1000,w=img.width,h=img.height;if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx}else{w=Math.round(w*mx/h);h=mx}}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);DEV_IMGS.push(c.toDataURL('image/jpeg',0.7));renderDevForm();toast('Photo attached')};img.src=dataUrl}
function devBadge(s){var m={new:['🟡','New'],understood:['🔵','I am on it'],question:['❓','Needs your answer'],approved:['🟢','Approved — running'],verify:['🧪','Verify it works'],done:['✅','Done']};var x=m[s]||m.new;return '<span class="pill">'+x[0]+' '+x[1]+'</span>'}
function devTargetRow(t){var tg=t.target||{};return '<div style="display:flex;gap:14px;align-items:center;margin-top:8px;font-size:13px;font-weight:600"><label style="display:flex;gap:5px;align-items:center;cursor:pointer"><input type="checkbox" '+(tg.dashboard?'checked':'')+' onclick="devTarget(&#39;'+t.id+'&#39;,&#39;dashboard&#39;)" style="width:auto;margin:0"> Dashboard <span class="note" style="border:0;padding:0;font-weight:400">(both)</span></label><label style="display:flex;gap:5px;align-items:center;cursor:pointer"><input type="checkbox" '+(tg.beta&&!tg.dashboard?'checked':'')+' onclick="devTarget(&#39;'+t.id+'&#39;,&#39;beta&#39;)" style="width:auto;margin:0"> Beta only</label></div>'}
function devCard(t){var imgs=(t.images||[]).map(function(u){return '<img src="'+u+'" style="max-width:80px;max-height:80px;border-radius:8px;margin:4px 4px 0 0">'}).join('');var b='<div class="taskrow" style="cursor:default"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><b>#'+t.num+' · '+esc(t.title||'(untitled)')+'</b>'+devBadge(t.status)+'</div>'+(t.desc?'<div class="note" style="margin-top:4px;white-space:pre-wrap">'+esc(t.desc)+'</div>':'')+(imgs?'<div style="margin-top:6px">'+imgs+'</div>':'');if(DEV_EDIT[t.id]!==undefined){b+='<div class="nextbox" style="margin-top:8px"><div class="lbl">Edit / add detail, then re-review</div><textarea id="ed_'+t.id+'" oninput="DEV_EDIT[&#39;'+t.id+'&#39;]=this.value;this.style.height=&#39;auto&#39;;this.style.height=this.scrollHeight+&#39;px&#39;" style="margin-top:6px;min-height:240px">'+esc(DEV_EDIT[t.id])+'</textarea><button class="mini" onclick="devMicEdit(&#39;'+t.id+'&#39;)">🎤 dictate</button><div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="devReviewSave(&#39;'+t.id+'&#39;)">🔁 Send for re-review</button><button class="btn sec" onclick="devReviewCancel(&#39;'+t.id+'&#39;)">Cancel</button></div></div>'}else{if(t.status==='understood'&&t.understanding){b+='<div class="nextbox" style="margin-top:8px"><div class="lbl">My understanding</div><div class="txt" style="white-space:pre-wrap">'+esc(t.understanding)+'</div>'+devTargetRow(t)+'<div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="devApprove(&#39;'+t.id+'&#39;)">✅ Go ahead</button><button class="btn sec" onclick="devReview(&#39;'+t.id+'&#39;)">🔁 Review it again</button></div></div>'}if(t.status==='question'){b+='<div class="followbox" style="margin-top:8px"><div class="lbl">Needs your answer</div><div style="white-space:pre-wrap;margin-top:3px">'+esc(t.question||'')+'</div><div class="note" style="border:0;padding:0;margin-top:6px">Reply here in chat referencing task #'+t.num+', or edit the task below.</div><button class="btn sec" style="margin-top:6px" onclick="devReview(&#39;'+t.id+'&#39;)">🔁 Review it again</button></div>'}if(t.status==='approved'){var tg=t.target||{};b+='<div class="note" style="margin-top:6px;color:#166534">▶ Approved for '+(tg.dashboard?'Dashboard + Beta':'Beta')+' — I am on it.</div>'}if(t.status==='verify'){b+='<div class="nextbox" style="margin-top:8px"><div class="lbl">Verify it works</div><div class="txt" style="font-weight:500">Built &amp; deployed — please confirm it is working.</div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="devVerify(&#39;'+t.id+'&#39;)">✅ Works — mark done</button><button class="btn sec" onclick="devReview(&#39;'+t.id+'&#39;)">🔁 Not quite</button></div></div>'}}b+='<div style="margin-top:6px"><button class="mini" onclick="devRemove(&#39;'+t.id+'&#39;)">✕ Remove</button></div></div>';return b}
function renderDevForm(){var el=document.getElementById('devPrev');if(el)el.innerHTML=DEV_IMGS.map(function(u){return '<img src="'+u+'" style="max-width:60px;max-height:60px;border-radius:8px;margin:4px 4px 0 0">'}).join('')}
function renderDev(){var active=devTasksView().filter(function(t){return t.status!=='done'});var done=devTasksView().filter(function(t){return t.status==='done'});active.sort(function(a,b){var g=devGroup(a)-devGroup(b);return g!==0?g:(a.num-b.num)});var h='<div style="display:flex;gap:6px;margin:0 2px 8px"><button class="mini'+(DEV_CAT==='build'?' jump':'')+'" onclick="devSwitchCat(&#39;build&#39;)">🛠️ Build</button><button class="mini'+(DEV_CAT==='general'?' jump':'')+'" onclick="devSwitchCat(&#39;general&#39;)">📋 General</button></div>';h+='<div class="dcard"><input id="devTitle" type="text" placeholder="Title (optional — I can name it)" value="'+esc(DEV_FORM.title)+'" oninput="DEV_FORM.title=this.value"><div style="position:relative"><textarea id="devDesc" placeholder="Describe the change — as much detail as you want" style="min-height:44px" oninput="DEV_FORM.desc=this.value;this.style.height=&#39;auto&#39;;this.style.height=this.scrollHeight+&#39;px&#39;">'+esc(DEV_FORM.desc)+'</textarea><button class="mini" onclick="devMic()" style="position:absolute;right:8px;bottom:14px">🎤</button></div><div id="devPrev"></div><div style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap"><label class="mini" style="cursor:pointer">📎 Attach<input type="file" accept="image/*" style="display:none" onchange="devFile(this)"></label>'+(DEV_CAT==='build'?'<select id="devPri" onchange="DEV_FORM.pri=this.value" style="border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-family:inherit"><option>Normal</option><option>High</option><option>Low</option></select>':'')+'<span class="note" style="border:0;padding:0">or paste a photo</span></div><button class="btn full" onclick="devAdd()" style="margin-top:8px">＋ Add task</button></div>';h+=active.length?(function(){var out='';var labels=['⭐ High priority','⏳ Awaiting your go-ahead','🔵 In progress','🟡 Not yet reviewed'];var lastG=-1;active.forEach(function(t){var g=devGroup(t);if(g!==lastG){out+='<div class="seclabel" style="margin:14px 2px 8px">'+labels[g]+'</div>';lastG=g;}out+=devCard(t);});return out;})():'<div class="note">No '+(DEV_CAT==='general'?'general':'active')+' tasks. Add one above.</div>';if(done.length){h+='<div class="dcard" style="margin-top:10px"><div style="cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="var d=document.getElementById(&#39;devDone&#39;);d.style.display=(d.style.display===&#39;none&#39;?&#39;block&#39;:&#39;none&#39;)"><b>✓ Completed ('+done.length+')</b><span class="note" style="border:0;padding:0">tap to expand</span></div><div id="devDone" style="display:none;margin-top:8px">'+done.map(function(t){return '<div class="note" style="border-bottom:1px solid var(--line);padding:6px 0"><b>#'+t.num+'</b> '+esc(t.title||t.desc||'')+(t.report?' — '+esc(t.report):'')+'</div>'}).join('')+'</div></div>'}var v=document.getElementById('view-dev');if(v)v.innerHTML=h;renderDevForm();var dd=document.getElementById('devDesc');if(dd&&dd.value){dd.style.height='auto';dd.style.height=dd.scrollHeight+'px'}}
