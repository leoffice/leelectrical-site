<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Substituted at build time from shared/productBrand.mjs — see the
         productBrand plugin in vite.config.js. Do not hard-code the name. -->
    <meta name="apple-mobile-web-app-title" content="%PRODUCT_NAME%" />
    <title>%PRODUCT_NAME%</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <!-- FOUC guard: keep layout sane before the main stylesheet arrives (esp. huge logos). -->
    <style>
      html, body { margin: 0; background: #f8fafc; }
      img[data-testid="app-logo"] { max-height: 8rem; max-width: 280px; width: auto; height: auto; object-fit: contain; }
    </style>
  </head>
  <body class="bg-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
