<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LE Electrical — Agent Console</title>
<style>
  :root{--green:#0f3d2e;--green2:#16513c;--lime:#9fe870;--blue:#2563eb;--bg:#f4f7fb;--card:#fff;--bd:#e3e8f0;--ink:#0f172a;--mut:#64748b;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:Inter,Segoe UI,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink)}
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--green),var(--green2));z-index:50}
  .gate-card{background:#fff;border-radius:18px;padding:32px 28px;width:330px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
  .gate-card h1{font-size:19px;margin:4px 0 2px}.gate-card p{color:var(--mut);font-size:13px;margin:0 0 16px}
  .gate-card input{width:100%;padding:11px 12px;margin:7px 0;border:1px solid var(--bd);border-radius:10px;font-size:14px}
  .gate-card button{width:100%;padding:12px;margin-top:8px;border:0;border-radius:10px;background:var(--lime);color:#0f3d2e;font-weight:800;font-size:15px;cursor:pointer}
  .gate-err{color:#dc2626;font-size:13px;min-height:18px;margin-top:6px}
  #app{display:none;flex-direction:column;height:100vh;max-width:820px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid var(--bd);padding:12px 16px}
  header b{font-weight:800}.sub{color:var(--mut);font-weight:600;font-size:13px}
  header button{border:1px solid var(--bd);background:#fff;border-radius:8px;padding:6px 10px;font-size:12px;color:var(--mut);cursor:pointer}
  #chans{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--bd)}
  #chans button{border:1px solid var(--bd);background:#fff;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;white-space:nowrap;flex:none}
  #chans button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  #thread{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:80%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .who{font-size:11px;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .m-commander{align-self:flex-end;background:#dcfce7;color:#14532d}.m-commander .who{color:#166534}
  .m-eved{align-self:flex-start;background:#ede9fe;color:#3b2a7c}.m-eved .who{color:#6d28d9}
  .m-dispatch{align-self:flex-start;background:#dbeafe;color:#1e3a8a}.m-dispatch .who{color:#1d4ed8}
  .m-agent{align-self:flex-start;background:#f1f5f9;color:#334155}.m-agent .who{color:#475569}
  .time{font-size:10px;color:var(--mut);margin-top:3px;opacity:.8}
  .empty{color:var(--mut);text-align:center;margin:auto;font-size:14px}
  .bar{display:flex;align-items:flex-end;gap:8px;padding:12px;border-top:1px solid var(--bd);background:#fff}
  .bar textarea{flex:1;resize:none;border:1px solid var(--bd);border-radius:12px;padding:10px 12px;font-size:14px;font-family:inherit;max-height:120px}
  .bar button{border:0;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:18px;flex:none}
  .mic{background:#f1f5f9;color:#475569}.mic.rec{background:#fee2e2;color:#dc2626;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.5}}
  .send{background:var(--blue);color:#fff}
  .hint{font-size:11px;color:var(--mut);padding:0 12px 8px;background:#fff}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <h1>Agent Console</h1><p>LE Electrical · secure sign-in</p>
    <input id="email" type="email" placeholder="Email" autocomplete="username">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    <button onclick="signIn()">Unlock</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>
<div id="app">
  <header>
    <div><b>Agent Console</b> <span class="sub" id="chanLabel">. General</span></div>
    <button onclick="signOut()">Sign out</button>
  </header>
  <div id="chans"></div>
  <div id="thread"><div class="empty">Loading...</div></div>
  <div class="hint" id="hint">Pick a channel above. Messages here go to that agent.</div>
  <div class="bar">
    <button class="mic" id="mic" title="Record" onclick="toggleMic()" aria-label="Record voice message">&#127908;</button>
    <textarea id="box" rows="1" placeholder="Message... (or tap the mic)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button class="send" onclick="sendMsg()" aria-label="Send">&#10148;</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://scgpxbubakfwypycugoa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjZ3B4YnViYWtmd3lweWN1Z29hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Mzk2MDQsImV4cCI6MjA5NzIxNTYwNH0.al1wWfAFyC_PeThXLQM2nfUngEAk-WKf6tFUz-MCFrQ";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const CHANNELS=[{key:'general',label:'General'},{key:'eved',label:'Eved'},{key:'ebay',label:'eBay'},{key:'supabase',label:'Supabase'},{key:'office',label:'LE Office'}];
let channel='general';
async function signIn(){const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value;const err=document.getElementById('gateErr');err.textContent="";const {error}=await sb.auth.signInWithPassword({email,password});if(error){err.textContent=error.message;return;}enter();}
async function signOut(){await sb.auth.signOut();location.reload();}
function enter(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='flex';renderChans();load();setInterval(load,4000);}
sb.auth.getSession().then(({data})=>{if(data.session)enter();});
function renderChans(){document.getElementById('chans').innerHTML=CHANNELS.map(c=>`<button class="${c.key===channel?'on':''}" onclick="switchChan('${c.key}')">${c.label}</button>`).join('');}
function switchChan(k){channel=k;renderChans();document.getElementById('chanLabel').textContent='. '+CHANNELS.find(c=>c.key===k).label;load();}
async function load(){const {data,error}=await sb.from('messages').select('*').eq('channel',channel).order('created_at',{ascending:true}).limit(200);if(error)return;const t=document.getElementById('thread');if(!data.length){t.innerHTML='<div class="empty">No messages in this channel yet.</div>';return;}const atBottom=t.scrollHeight-t.scrollTop-t.clientHeight<60;t.innerHTML=data.map(m=>{const who=(m.sender||'').toLowerCase();const cls=who==='commander'?'m-commander':who==='eved'?'m-eved':who==='dispatch'?'m-dispatch':'m-agent';const label=who==='commander'?'You':who.charAt(0).toUpperCase()+who.slice(1);const time=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return `<div class="msg ${cls}"><div class="who">${label}</div>${esc(m.content)}<div class="time">${time}</div></div>`;}).join('');if(atBottom)t.scrollTop=t.scrollHeight;}
async function sendMsg(){const box=document.getElementById('box');const text=box.value.trim();if(!text)return;let target=null;const mt=text.match(/^@(eved|dispatch)\b/i);if(mt)target='@'+mt[1].toLowerCase();box.value='';box.style.height='auto';const {error}=await sb.from('messages').insert({sender:'commander',channel,target,content:text});if(error){alert(error.message);box.value=text;return;}load();}
let recog=null,recording=false;
function toggleMic(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Voice input needs Chrome/Safari. Type instead.');return;}const mic=document.getElementById('mic');if(recording){recog&&recog.stop();return;}recog=new SR();recog.lang='en-US';recog.interimResults=true;recog.continuous=true;let base=document.getElementById('box').value;recog.onresult=(e)=>{let s='';for(let i=0;i<e.results.length;i++)s+=e.results[i][0].transcript;document.getElementById('box').value=(base?base+' ':'')+s;};recog.onend=()=>{recording=false;mic.classList.remove('rec');};recog.onerror=()=>{recording=false;mic.classList.remove('rec');};recog.start();recording=true;mic.classList.add('rec');}
const box=document.getElementById('box');box.addEventListener('input',()=>{box.style.height='auto';box.style.height=Math.min(box.scrollHeight,120)+'px';});
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
</script>
</body>
</html>
