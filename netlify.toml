# Static site — no build step; publish repo root.
[build]
  publish = "."

# Branch "beta" gets its own preview URL (test before promoting to live).
[context.beta]
  # deployed at the beta branch subdomain / branch-deploy URL

[functions]
  directory = "netlify/functions"

[functions."docs-cleanup"]
  schedule = "@daily"

# Short customer pay links — /pay/251825-x7k2 → pay-link resolver → LE Pro pay page
[[redirects]]
  from = "/pay/:code"
  to = "/.netlify/functions/pay-link"
  status = 200
  query = { code = ":code" }
  force = true
