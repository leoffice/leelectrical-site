# Static site — no build step; publish repo root.
[build]
  publish = "."

# Branch "beta" gets its own preview URL (test before promoting to live).
[context.beta]
  # deployed at the beta branch subdomain / branch-deploy URL

[functions]
  directory = "netlify/functions"
  # pdfkit must stay external — bundling breaks AFM font data paths (502 on generate-doc).
  external_node_modules = ["pdfkit"]
  included_files = [
    "netlify/functions/lib/le-invoice-suite/fonts/**",
    "netlify/functions/lib/le-invoice-suite/assets/**",
    "node_modules/pdfkit/js/data/**",
  ]

[functions."docs-cleanup"]
  schedule = "@daily"

# Short customer pay links — /pay/251825-x7k2 → pay-link resolver → LE Pro pay page
[[redirects]]
  from = "/pay/:code"
  to = "/.netlify/functions/pay-link"
  status = 200
  query = { code = ":code" }
  force = true
