<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>LE Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{--blueprint:#15324f;--wall:#2f6bb0;--wall-hi:#4c8ad0;--wall-sh:#10243a;--floor:#e7dcc0;--floor2:#dcd0b0;--corridor:#cfc4a6;--lime:#9fe870;--green:#0f3d2e;--green2:#16513c;--amber:#ea8a0b;--violet:#7c3aed;--teal:#0d9488;--blue:#2f7fd8;--desk:#9a6a3a;--desk2:#6e4526;--pix:'Press Start 2P',monospace;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:#0a1622;color:#e8f0f7;font-family:Inter,system-ui,sans-serif;user-select:none}
.topbar{position:fixed;top:0;left:0;right:0;height:46px;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--green2);border-bottom:3px solid var(--lime)}
.topbar .t{font-family:var(--pix);font-size:9px;color:var(--lime)}
.role{display:flex;gap:5px;align-items:center;font-size:10px;color:#9bbed1}
.role button{font-family:var(--pix);font-size:6px;border:1px solid var(--lime);background:transparent;color:var(--lime);padding:5px 6px;border-radius:5px;cursor:pointer}
.role button.on{background:var(--lime);color:var(--green)}
.viewport{position:fixed;top:46px;left:0;right:0;bottom:58px;overflow:hidden;background:var(--corridor);touch-action:none;cursor:grab}
.viewport::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:25;box-shadow:inset 0 0 140px rgba(10,22,34,.5)}
.world{position:absolute;top:0;left:0;width:1480px;height:1620px;transform-origin:0 0;background:var(--corridor);background-image:linear-gradient(0deg,#c4b99b 1px,transparent 1px),linear-gradient(90deg,#c4b99b 1px,transparent 1px);background-size:40px 40px}
.room{position:absolute;border-radius:4px;cursor:pointer;background:var(--floor);background-image:linear-gradient(0deg,var(--floor2) 1px,transparent 1px),linear-gradient(90deg,var(--floor2) 1px,transparent 1px);background-size:34px 34px;border:8px solid var(--wall);box-shadow:0 8px 0 var(--wall-sh),inset 0 0 0 2px var(--wall-hi),inset 0 0 40px rgba(16,36,58,.18);transition:box-shadow .35s}
.room.focus{box-shadow:0 8px 0 var(--wall-sh),inset 0 0 0 2px var(--wall-hi),0 0 0 4px var(--lime),0 0 34px rgba(159,232,112,.6)}
.room .title{position:absolute;top:-2px;left:50%;transform:translateX(-50%);z-index:9;font-family:var(--pix);font-size:9px;text-align:center;white-space:nowrap;background:var(--blueprint);color:#cfe6ff;padding:6px 10px;border-radius:0 0 6px 6px;border:1px solid var(--wall-hi)}
.room.gray{filter:grayscale(.8) opacity(.55)}.room.gray .title{color:#9fb}
.door{position:absolute;background:var(--corridor);z-index:6}
.deskunit{position:absolute}.desk{position:absolute;background:var(--desk);border-radius:3px;box-shadow:0 2px 0 var(--desk2)}
.mon{position:absolute;background:#0c1c17;border:1px solid #0a3b2c;border-radius:2px;box-shadow:inset 0 0 3px #29d3a3}
.person{position:absolute;width:18px;height:22px;z-index:8;cursor:pointer}.person .head{width:11px;height:11px;border-radius:50%;margin:0 auto;border:2px solid rgba(0,0,0,.3)}.person .body{width:16px;height:12px;border-radius:5px 5px 4px 4px;margin:-2px auto 0;border:2px solid rgba(0,0,0,.25)}
.type{animation:type .9s steps(2) infinite}@keyframes type{50%{transform:translateY(-1px)}}
.sign{position:absolute;z-index:7;font-family:var(--pix);font-size:6px;text-align:center;background:#143b5e;color:#bfe0ff;padding:3px 5px;border-radius:3px;border:1px solid var(--wall-hi);transform:translateX(-50%);white-space:nowrap}
.table{position:absolute;background:#7a5230;border-radius:14px;box-shadow:0 3px 0 #553616}
.rack{position:absolute;background:#10161e;border:1px solid #36424f;border-radius:2px}.rack i{position:absolute;left:14%;right:14%;height:3px;background:#29d3a3;opacity:.55}
.plant{position:absolute;width:14px;height:14px;border-radius:50%;background:#4f9d52;box-shadow:0 0 0 3px #2f5d31}
.walker{position:absolute;width:18px;height:22px;z-index:12;cursor:pointer}.walker .head{width:11px;height:11px;border-radius:50%;margin:0 auto;border:2px solid rgba(0,0,0,.3)}.walker .body{width:16px;height:12px;border-radius:5px 5px 4px 4px;margin:-2px auto 0;border:2px solid rgba(0,0,0,.25)}
.bob{animation:bob .45s steps(2) infinite}@keyframes bob{50%{transform:translateY(-2px)}}
#tip{position:fixed;z-index:60;pointer-events:none;background:var(--green);border:2px solid var(--lime);border-radius:8px;padding:7px 9px;max-width:200px;font-size:12px;line-height:1.4;opacity:0;transition:opacity .12s;color:#e8f5ee}
#tip.show{opacity:1}#tip .n{font-weight:700;color:var(--lime)}#tip .r{color:#bfe0ff;font-size:11px}#tip .s{margin-top:3px}
.room.locked{filter:grayscale(100%) opacity(.5);pointer-events:none}.room.locked::after{content:"🔒";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px;z-index:14}
.nav{position:fixed;bottom:0;left:0;right:0;height:58px;z-index:30;display:flex;background:var(--green2);border-top:3px solid var(--lime);overflow-x:auto}
.nav button{flex:1 0 auto;min-width:62px;background:none;border:0;color:#9bbed1;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:var(--pix);font-size:6px;line-height:1.3;padding:0 4px}
.nav button .ni{font-size:15px}.nav button.on{color:var(--lime)}.nav button[disabled]{opacity:.3;pointer-events:none}
.scrim{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.45);opacity:0;visibility:hidden;transition:.25s}.scrim.open{opacity:1;visibility:visible}
.drawer{position:fixed;left:0;right:0;bottom:0;z-index:41;max-height:82vh;overflow:auto;background:var(--green);border-top:3px solid var(--lime);border-radius:16px 16px 0 0;transform:translateY(103%);transition:transform .34s cubic-bezier(.2,.8,.2,1);padding:14px 16px 24px;color:#e8f5ee}
.drawer.open{transform:translateY(0)}.drawer .grab{width:42px;height:4px;background:#9bbed1;border-radius:3px;margin:0 auto 12px;opacity:.5}
.drawer h2{font-family:var(--pix);font-size:11px;margin:0 0 12px;line-height:1.5}
.hud{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat{background:rgba(255,255,255,.05);border-radius:10px;padding:10px}.stat .k{font-size:11px;color:#9bbed1}.stat .v{font-size:20px;font-weight:700;margin-top:2px}.bar{height:7px;border-radius:4px;background:rgba(255,255,255,.1);margin-top:8px;overflow:hidden}.bar i{display:block;height:100%}
.console{background:#0a1812;border:1px solid var(--green2);border-radius:10px;padding:10px;height:140px;overflow:auto;font-size:13px;line-height:1.5;margin-bottom:12px}.console .who{font-weight:700}
.mic{width:100%;padding:14px;border:0;border-radius:12px;background:var(--lime);color:var(--green);cursor:pointer;font-family:var(--pix);font-size:10px}.mic.rec{background:#ef5350;color:#fff;animation:bob .6s infinite}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{border-radius:10px;padding:10px;background:rgba(124,58,237,.14);border:1px solid var(--violet)}.card .k{font-size:11px;color:#c4b5fd}.card .v{font-size:18px;font-weight:700}
.feed{list-style:none;margin:0;padding:0}.feed li{background:rgba(159,232,112,.08);border-left:3px solid var(--lime);border-radius:0 8px 8px 0;padding:8px 10px;margin-bottom:8px;font-size:13px}
.note{font-size:11px;color:#9bbed1;margin-top:8px}
</style></head><body>
<div class="topbar"><div class="t">LE&nbsp;COMMAND&nbsp;CENTER</div><div class="role">view:<button id="roleOwner" class="on" onclick="setRole('owner')">OWNER</button><button id="roleTech" onclick="setRole('field_technician')">FIELD&nbsp;TECH</button></div></div>
<div class="viewport" id="viewport"><div class="world" id="world"></div></div>
<nav class="nav" id="nav"></nav><div id="tip"></div>
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div class="grab"></div><div id="drawerBody"></div></div>
<script>
const SHIRT=['#9fe870','#2f7fd8','#ea8a0b','#7c3aed','#0d9488','#e2546b','#e2a83b'];const SKIN=['#f1c27d','#e8b48a','#d99a6c'];const pick=a=>a[Math.floor(Math.random()*a.length)];
const ROOMS={commander:{x:40,y:40,w:580,h:400,name:'COMMANDER OFFICE',icon:'👔',zoom:1.15,door:'right',table:true,desks:[{label:'LEVI — COMMANDER',n:'Levi',r:'Commander',s:'Reviewing today’s jobs'},{label:'MASTER DAVID',n:'Master David',r:'AI Master Agent',s:'Coordinating the agents'}]},secretary:{x:660,y:40,w:300,h:260,name:'SECRETARY',icon:'📇',zoom:1.7,door:'left',desks:[{label:'SECRETARY',n:'Office Secretary',r:'Front Desk',s:'Answering customer calls'}]},le:{x:1000,y:40,w:440,h:560,name:'LE ELECTRICAL OPERATIONS',icon:'🏢',zoom:1.05,door:'left',desks:[{label:'SCHEDULING',n:'Scheduling Officer',r:'Dispatch',s:'Booking Edgemere Commons job'},{label:'INVOICING',n:'Billing Clerk',r:'Invoicing',s:'Invoice #1043 — $1,850'},{label:'ESTIMATES',n:'Estimator',r:'Estimates',s:'Quoting 10-charger EV install'},{label:'FOLLOW-UP',n:'Follow-up Rep',r:'Retention',s:'Calling Ms. Katzman'},{label:'OPEN DESK',n:'(vacant)',r:'Open',s:'Available'},{label:'OPEN DESK',n:'(vacant)',r:'Open',s:'Available'}]},ebay:{x:40,y:500,w:500,h:440,name:'eBAY DROPSHIPPING HUB',icon:'📦',zoom:1.1,door:'right',restrict:'owner',desks:[{label:'IDEA LAB',n:'Product Researcher',r:'Idea Lab',s:'Sourcing products'},{label:'POST MGMT',n:'Listing Manager',r:'Post Mgmt',s:'Publishing 12 listings'},{label:'LISTINGS & FULFILLMENT',n:'Fulfillment Op',r:'Orders',s:'Pushing tracking to eBay'}]},appdev:{x:580,y:360,w:380,h:300,name:'APP DEVELOPMENT',icon:'💻',zoom:1.25,door:'top',desks:[{label:'DEV',n:'Dev Agent',r:'App Dev',s:'Building the dashboard'},{label:'QA',n:'QA',r:'Testing',s:'Running checks'}]},systems:{x:1000,y:640,w:440,h:360,name:'SYSTEMS & TECHNICAL',icon:'🖥️',zoom:1.15,door:'left',restrict:'owner',racks:true,desks:[{label:'CONFIG',n:'Systems Op',r:'Infra',s:'Supabase + integrations'}]},exp1:{x:580,y:700,w:380,h:300,name:'EXPANSION',icon:'➕',zoom:1.25,gray:true,desks:[]},exp2:{x:40,y:980,w:500,h:300,name:'EXPANSION',icon:'➕',zoom:1.1,gray:true,desks:[]}};
const world=document.getElementById('world'),viewport=document.getElementById('viewport');
function el(p,c,s,html){const d=document.createElement('div');d.className=c;d.style.cssText=s;if(html)d.innerHTML=html;p.appendChild(d);return d;}
function build(){for(const key in ROOMS){const r=ROOMS[key];const room=el(world,'room'+(r.gray?' gray':''),`left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px`);room.dataset.room=key;el(room,'title','',(r.icon?r.icon+' ':'')+r.name);const dz={top:`left:50%;top:-8px;transform:translateX(-50%);width:46px;height:8px`,left:`left:-8px;top:50%;transform:translateY(-50%);width:8px;height:46px`,right:`right:-8px;top:50%;transform:translateY(-50%);width:8px;height:46px`,bottom:`left:50%;bottom:-8px;transform:translateX(-50%);width:46px;height:8px`};if(r.door)el(room,'door',dz[r.door]);if(r.gray)continue;if(r.table)el(room,'table',`left:24%;top:34%;width:38%;height:30%`);if(r.racks){el(room,'rack',`left:24px;top:60px;width:42px;height:150px`,'<i style="top:14px"></i><i style="top:34px"></i><i style="top:54px"></i>');el(room,'rack',`left:78px;top:60px;width:42px;height:150px`,'<i style="top:18px"></i><i style="top:46px"></i>');}const perRow=Math.ceil(r.desks.length/2)||1,slotW=(r.w-60)/perRow;r.desks.forEach((d,i)=>{const row=i<perRow?0:1,col=i%perRow,x=30+col*slotW+(slotW-40)/2,y=row===0?46:r.h-86;const u=el(room,'deskunit',`left:${x}px;top:${y}px`);el(u,'desk',`left:0;top:18px;width:40px;height:15px`);el(u,'mon',`left:13px;top:18px;width:14px;height:9px`);el(u,'sign',`left:20px;top:${row===0?-2:42}px`,d.label);if(d.n&&d.n!=='(vacant)'){const p=el(u,'person'+(i%2?' type':''),`left:11px;top:${row===0?34:-6}px`,`<div class="head" style="background:${pick(SKIN)}"></div><div class="body" style="background:${pick(SHIRT)}"></div>`);p.dataset.n=d.n;p.dataset.r=d.r;p.dataset.s=d.s;bindTip(p);}});el(room,'plant',`right:14px;bottom:14px`);}}
const WALKERS=[{n:'Foreman Mike',r:'Field Lead',s:'Heading to Operations',path:[[300,470],[640,470],[640,300],[300,470]],dur:18},{n:'Eved Runner',r:'AI Courier',s:'Delivering a permit update',path:[[300,300],[980,300],[980,640],[300,300]],dur:24},{n:'eBay Picker',r:'Fulfillment',s:'Bringing packing slips',path:[[300,940],[300,470],[640,470],[300,940]],dur:21},{n:'IT Tech',r:'Systems',s:'On a support round',path:[[1100,620],[1100,300],[700,360],[1100,620]],dur:23}];
function buildWalkers(){WALKERS.forEach(w=>{const d=el(world,'walker',`left:0;top:0`,`<div class="head bob" style="background:${pick(SKIN)}"></div><div class="body" style="background:${pick(SHIRT)}"></div>`);d.dataset.n=w.n;d.dataset.r=w.r;d.dataset.s=w.s;bindTip(d);const f=[];w.path.forEach(p=>{f.push({transform:`translate(${p[0]}px,${p[1]}px)`});f.push({transform:`translate(${p[0]}px,${p[1]}px)`});});d.animate(f,{duration:w.dur*1000,iterations:Infinity,easing:'ease-in-out'});});}
const tip=document.getElementById('tip');
function showTip(e,t){tip.innerHTML=`<div class="n">${t.dataset.n}</div><div class="r">${t.dataset.r}</div><div class="s">${t.dataset.s}</div>`;const x=(e.touches?e.touches[0].clientX:e.clientX),y=(e.touches?e.touches[0].clientY:e.clientY);tip.style.left=Math.min(x+12,innerWidth-210)+'px';tip.style.top=Math.max(y-60,52)+'px';tip.classList.add('show');}
function hideTip(){tip.classList.remove('show');}
function bindTip(n){n.addEventListener('pointerenter',e=>showTip(e,n));n.addEventListener('pointermove',e=>{if(tip.classList.contains('show'))showTip(e,n);});n.addEventListener('pointerleave',hideTip);n.addEventListener('click',e=>{e.stopPropagation();showTip(e,n);setTimeout(hideTip,2200);});}
let cam={x:0,y:0,s:1};
function apply(a){world.style.transition=a?'transform .5s cubic-bezier(.2,.8,.2,1)':'none';world.style.transform=`translate(${cam.x}px,${cam.y}px) scale(${cam.s})`;}
function cs(s){return Math.max(.3,Math.min(2.4,s));}
function fg(k){const rm=document.querySelector('[data-room='+k+']');if(!rm)return;document.querySelectorAll('.room').forEach(r=>r.classList.remove('focus'));rm.classList.add('focus');setTimeout(()=>rm.classList.remove('focus'),1400);}
function snapTo(k){const r=ROOMS[k];if(!r)return;const vp=viewport.getBoundingClientRect();cam.s=cs(r.zoom);const cx=r.x+r.w/2,cy=r.y+r.h/2;cam.x=vp.width/2-cx*cam.s;cam.y=vp.height/2-cy*cam.s;apply(true);fg(k);document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.room===k));}
function overview(){const vp=viewport.getBoundingClientRect();cam.s=cs(Math.min(vp.width/1480,vp.height/1620));cam.x=(vp.width-1480*cam.s)/2;cam.y=8;apply(true);document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.room==='overview'));}
const pts=new Map();let pinch=null;
viewport.addEventListener('pointerdown',e=>{pts.set(e.pointerId,{x:e.clientX,y:e.clientY});viewport.setPointerCapture(e.pointerId);});
viewport.addEventListener('pointermove',e=>{if(!pts.has(e.pointerId))return;const p=pts.get(e.pointerId);if(pts.size===1){cam.x+=e.clientX-p.x;cam.y+=e.clientY-p.y;p.x=e.clientX;p.y=e.clientY;apply(false);}else if(pts.size===2){p.x=e.clientX;p.y=e.clientY;const a=[...pts.values()];const dist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),mx=(a[0].x+a[1].x)/2,my=(a[0].y+a[1].y)/2;const vp=viewport.getBoundingClientRect(),lx=mx-vp.left,ly=my-vp.top;if(!pinch)pinch={d:dist,s:cam.s};const ns=cs(pinch.s*(dist/pinch.d));const wx=(lx-cam.x)/cam.s,wy=(ly-cam.y)/cam.s;cam.s=ns;cam.x=lx-wx*ns;cam.y=ly-wy*ns;apply(false);}});
function pUp(e){pts.delete(e.pointerId);if(pts.size<2)pinch=null;}viewport.addEventListener('pointerup',pUp);viewport.addEventListener('pointercancel',pUp);
viewport.addEventListener('wheel',e=>{e.preventDefault();const vp=viewport.getBoundingClientRect();const lx=e.clientX-vp.left,ly=e.clientY-vp.top,ns=cs(cam.s*(e.deltaY<0?1.12:.89));const wx=(lx-cam.x)/cam.s,wy=(ly-cam.y)/cam.s;cam.s=ns;cam.x=lx-wx*ns;cam.y=ly-wy*ns;apply(false);},{passive:false});
let dp=null;viewport.addEventListener('pointerdown',e=>dp={x:e.clientX,y:e.clientY});
function bindRooms(){document.querySelectorAll('.room').forEach(rm=>rm.addEventListener('click',e=>{if(dp&&Math.hypot(e.clientX-dp.x,e.clientY-dp.y)>10)return;if(rm.classList.contains('locked')||rm.classList.contains('gray'))return;const k=rm.dataset.room;snapTo(k);openDrawer(k);}));}
const scrim=document.getElementById('scrim'),drawer=document.getElementById('drawer'),dbody=document.getElementById('drawerBody');
function openDrawer(k){dbody.innerHTML=dH(k);scrim.classList.add('open');drawer.classList.add('open');}
function closeDrawer(){scrim.classList.remove('open');drawer.classList.remove('open');stopMic();}
function dH(k){if(k==='commander')return `<h2>👔 Commander Office — Eved</h2><ul class="feed"><li><b>Eved:</b> status jobs green · synthesis 6pm.</li><li><b>Eved:</b> tokens trimmed ~76%.</li><li><b>Eved:</b> profiles table live — RBAC ready.</li><li><b>Eved:</b> awaiting QuickBooks sign-in.</li></ul><div class="note">live feed from agent channel (Supabase).</div>`;if(k==='le')return `<h2>🏢 LE Electrical Operations</h2><div class="hud"><div class="stat"><div class="k">Money spent</div><div class="v">$12,480</div><div class="bar"><i style="width:62%;background:#ef5350"></i></div></div><div class="stat"><div class="k">Revenue</div><div class="v">$20,150</div><div class="bar"><i style="width:100%;background:var(--lime)"></i></div></div></div><div class="console" id="cons"><div><span class="who" style="color:#6fd8bd">Scheduling:</span> Mike → 287 Ocean Ave, ETA 2:45.</div><div><span class="who" style="color:#f6c074">Field — Mike:</span> On site.</div></div><button class="mic" id="micBtn">🎤 HOLD TO TALK</button><div class="note">demo data; mic uses browser speech-to-text.</div>`;if(k==='ebay')return `<h2>📦 eBay Dropshipping Hub</h2><div class="cards"><div class="card"><div class="k">Active listings</div><div class="v">142</div></div><div class="card"><div class="k">Avg margin</div><div class="v">28%</div></div><div class="card"><div class="k">Today's sales</div><div class="v">$640</div></div><div class="card"><div class="k">Sync</div><div class="v">● OK</div></div></div>`;if(k==='systems')return `<h2>🖥️ Systems & Technical</h2><div class="cards"><div class="card" style="background:rgba(47,127,216,.14);border-color:var(--blue)"><div class="k" style="color:#bfe0ff">Agents</div><div class="v">4 / 4</div></div><div class="card" style="background:rgba(47,127,216,.14);border-color:var(--blue)"><div class="k" style="color:#bfe0ff">Supabase</div><div class="v">● Live</div></div></div>`;if(k==='appdev')return `<h2>💻 App Development</h2><div class="note">Build queue, deploys, iterations.</div>`;if(k==='secretary')return `<h2>📇 Secretary</h2><div class="note">Front-desk: calls, intake, routing.</div>`;return `<h2>Room</h2>`;}
let recog=null;function startMic(b){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;b.classList.add('rec');b.textContent='🔴 LISTENING…';if(!SR)return;recog=new SR();recog.lang='en-US';recog.interimResults=true;recog.continuous=true;let t='';recog.onresult=e=>{t='';for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;};recog.onend=()=>{if(t){const c=document.getElementById('cons');if(c){c.insertAdjacentHTML('beforeend',`<div><span class="who" style="color:var(--lime)">You:</span> ${t}</div>`);c.scrollTop=c.scrollHeight;}}};try{recog.start();}catch(_){}}
function stopMic(){const b=document.getElementById('micBtn');if(b){b.classList.remove('rec');b.textContent='🎤 HOLD TO TALK';}if(recog){try{recog.stop();}catch(_){}}}
drawer.addEventListener('pointerdown',e=>{if(e.target.id==='micBtn')startMic(e.target);});window.addEventListener('pointerup',()=>stopMic());
function buildNav(role){const owner=role==='owner';let h=`<button data-room="overview" onclick="overview()"><span class="ni">🗺️</span>MAP</button>`;h+=Object.entries(ROOMS).filter(([k,r])=>!r.gray).map(([k,r])=>{const blk=r.restrict&&!owner;return `<button data-room="${k}" ${blk?'disabled':''} onclick="snapTo('${k}');openDrawer('${k}')"><span class="ni">${r.icon}</span>${k.slice(0,5).toUpperCase()}</button>`;}).join('');document.getElementById('nav').innerHTML=h;}
function setRole(role){document.getElementById('roleOwner').classList.toggle('on',role==='owner');document.getElementById('roleTech').classList.toggle('on',role!=='owner');applyRole(role);}
function applyRole(role){const owner=role==='owner';document.querySelectorAll('.room').forEach(rm=>{const r=ROOMS[rm.dataset.room];rm.classList.toggle('locked',!!(r&&r.restrict&&!owner));});buildNav(role);closeDrawer();if(!owner)snapTo('le');else overview();}
window.addEventListener('load',()=>{build();buildWalkers();bindRooms();applyRole('owner');});
</script></body></html>
